services:
  - type: web
    name: eblg-dashboard
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Si tu utilises AirLabs pour les positions:
      - key: AIRLABS_KEY
        sync: false
      # PORT est géré automatiquement par Render. Si tu veux forcer 10000 en local,
      # garde ton process.env.PORT || 10000 dans server/app.js
    autoDeploy: true
``
