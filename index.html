<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EBLG – Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<!-- Leaflet + Heatmap + PolylineDecorator (CORRECT) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.polyline-decorator/1.7.0/leaflet.polyline-decorator.min.js"></script>

<!-- Chart.js + SignalR -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.0/signalr.min.js"></script>

<style>
body{margin:0;font-family:system-ui;display:flex;flex-direction:column;height:100vh}
header{background:#111827;color:#f9fafb;padding:.5rem 1rem;display:flex;justify-content:space-between}
header button{margin-left:.25rem;padding:.25rem .5rem;background:#1f2937;color:#e5e7eb;border:1px solid #4b5563;border-radius:4px;cursor:pointer}
main{display:flex;flex:1;overflow:hidden}
#sidebar{width:360px;background:#f3f4f6;padding:.75rem;overflow-y:auto;border-right:1px solid #d1d5db;font-size:.85rem}
#map{flex:1}
.block{margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #e5e7eb}
#fids-tabs{display:flex;gap:1rem;margin-bottom:.5rem}
#fids-tabs span{cursor:pointer;color:#374151}
#fids-tabs span.active{color:#1d4ed8;font-weight:700;border-bottom:2px solid #1d4ed8}
.small{font-size:.78rem;color:#4b5563}
#plane-info{border-left:4px solid #6b7280;padding-left:.5rem;display:none}
#corridor-panel label{display:flex;align-items:center;gap:.35rem;margin-bottom:.15rem}
</style>
</head>

<body>
<header>
  <div>EBLG Dashboard</div>
  <div>
    <button id="toggle-tracks">Trajectoires : ON</button>
    <button id="toggle-heatmap">Heatmap : ON</button>
    <button id="toggle-corridor">Corridor : ON</button>
    <button id="toggle-sonos">Sonomètres : ON</button>
    <button id="reset-map">Reset</button>
  </div>
</header>

<main>
<section id="sidebar">

<div class="block"><h2>Météo</h2><div id="meteo-summary"></div><div id="meteo-raw" class="small"></div></div>
<div class="block"><h2>Piste active</h2><div id="runway-info"></div></div>

<div class="block" id="corridor-panel">
  <h2>Corridor</h2>
  <div id="corridor-info" class="small"></div>
  <label><input type="checkbox" id="chk-dep" checked>Trapèze départ</label>
  <label><input type="checkbox" id="chk-arr" checked>Trapèze arrivée</label>
  <label><input type="checkbox" id="chk-labels" checked>Labels DEP/ARR</label>
  <label><input type="checkbox" id="chk-gradient" checked>Gradient</label>
  <div class="small" style="margin-top:.35rem">
    Départ : 0.3 km × 8 km<br>Arrivée : 0.15 km × 3 km
  </div>
</div>

<div class="block"><h2>Sonomètres impactés</h2><div id="sonos-impacted"></div></div>
<div class="block"><h2>Bruit temps réel</h2><div id="noise-live"></div></div>
<div class="block"><h2>Alertes</h2><div id="alerts"></div></div>

<div class="block">
  <h2>Vols (FIDS)</h2>
  <div id="fids-tabs">
    <span data-tab="all" class="active">Tous</span>
    <span data-tab="dep">Départs</span>
    <span data-tab="arr">Arrivées</span>
  </div>
  <div id="flights-list"></div>
</div>

<div class="block"><h2>Détail vol</h2><div id="flight-detail"></div></div>
<div class="block"><h2>Avion sélectionné</h2><div id="plane-info"></div></div>

</section>
<section id="map"></section>
</main>
<script>
/* ============================================================
   CONFIGURATION GÉNÉRALE
   ============================================================ */
const AVWX_TOKEN = "ersegQzkf2Dfal-o26B4b5uzMrXBeHK2jOpOaY7nffc";
const AVWX_ICAO  = "EBLG";

const FIDS_PROXY = "https://eblg-proxy.onrender.com/fids?url=";
const FIDS_URL_ARR = FIDS_PROXY + encodeURIComponent("https://fids.liegeairport.com/api/flights/Arrivals");
const FIDS_URL_DEP = FIDS_PROXY + encodeURIComponent("https://fids.liegeairport.com/api/flights/Departures");

const ADSB_URL = "https://opensky-network.org/api/states/all";

const EBLG = {
  lat: 50.6374,
  lon: 5.4432,
  runways: [
    { name: "04", heading: 40 },
    { name: "22", heading: 220 }
  ]
};

let LAST_FIDS = null;
let FIDS_FILTER = "all";

let HEATMAP_ENABLED   = true;
let TRACKS_ENABLED    = true;
let CORRIDOR_ENABLED  = true;
let SONOS_ENABLED     = true;

let lastHeading = null;
let lastRunway  = null;

let heatLayer = null;
let departureLayer = null;
let arrivalLayer = null;
let departureArrow = null;
let arrivalArrow = null;

/* ============================================================
   INITIALISATION DE LA CARTE
   ============================================================ */
const map = L.map("map").setView([EBLG.lat, EBLG.lon], 11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18
}).addTo(map);

/* ============================================================
   GRADIENTS SVG (JAUNE / VIOLET)
   ============================================================ */
setTimeout(() => {
  const svg = document.querySelector("svg");
  if (!svg) return;

  const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
  defs.innerHTML = `
    <linearGradient id="grad-dep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="grad-arr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.05"/>
    </linearGradient>
  `;
  svg.appendChild(defs);
}, 100);

/* ============================================================
   SONOMÈTRES
   ============================================================ */
const SONOS = [
  {id:"F017",lat:50.764883,lon:5.630606},
  {id:"F001",lat:50.738044,lon:5.608833},
  {id:"F014",lat:50.718894,lon:5.573164},
  {id:"F015",lat:50.688839,lon:5.526217},
  {id:"F005",lat:50.639331,lon:5.323519},
  {id:"F003",lat:50.601167,lon:5.3814},
  {id:"F011",lat:50.601142,lon:5.355006},
  {id:"F008",lat:50.594878,lon:5.35895},
  {id:"F002",lat:50.588414,lon:5.370522},
  {id:"F007",lat:50.590756,lon:5.344114},
  {id:"F009",lat:50.580831,lon:5.355417},
  {id:"F004",lat:50.605414,lon:5.321406},
  {id:"F010",lat:50.599392,lon:5.313492},
  {id:"F013",lat:50.586914,lon:5.308678},
  {id:"F016",lat:50.619617,lon:5.295344},
  {id:"F006",lat:50.609594,lon:5.271403},
  {id:"F012",lat:50.621917,lon:5.254747}
];

const SONO_MARKERS = {};

SONOS.forEach(s => {
  const m = L.circleMarker([s.lat, s.lon], {
    radius: 6,
    color: "#4b5563",
    fillColor: "#9ca3af",
    fillOpacity: 0.9
  }).addTo(map);

  SONO_MARKERS[s.id] = m;
});

/* ============================================================
   OUTILS GÉODÉSIQUES
   ============================================================ */
const toRad = d => d * Math.PI / 180;
const toDeg = r => r * 180 / Math.PI;

function computePoint([lat, lon], heading, distKm) {
  const R = 6371;
  const br = toRad(heading);
  const dR = distKm / R;

  const lat1 = toRad(lat);
  const lon1 = toRad(lon);

  const lat2 = Math.asin(
    Math.sin(lat1) * Math.cos(dR) +
    Math.cos(lat1) * Math.sin(dR) * Math.cos(br)
  );

  const lon2 = lon1 + Math.atan2(
    Math.sin(br) * Math.sin(dR) * Math.cos(lat1),
    Math.cos(dR) - Math.sin(lat1) * Math.sin(lat2)
  );

  return [toDeg(lat2), toDeg(lon2)];
}

/* ============================================================
   SEUILS DE PISTE
   ============================================================ */
const RWY04_START = [50.63795, 5.4438];
const RWY04_END   = [50.6436,  5.452];

const RWY22_START = RWY04_END;
const RWY22_END   = RWY04_START;

/* ============================================================
   TRAPÈZES (DÉPART / ARRIVÉE)
   ============================================================ */
function buildDepartureTrapezoid(h) {
  const start = h === 40 ? RWY04_START :
                h === 220 ? RWY22_START :
                [EBLG.lat, EBLG.lon];

  return [
    computePoint(start, h - 90, 0.3),
    computePoint(start, h + 90, 0.3),
    computePoint(start, h + 90, 8),
    computePoint(start, h - 90, 8)
  ];
}

function buildArrivalTrapezoid(h) {
  const end = h === 40 ? RWY04_END :
              h === 220 ? RWY22_END :
              [EBLG.lat, EBLG.lon];

  return [
    computePoint(end, h - 90, 0.15),
    computePoint(end, h + 90, 0.15),
    computePoint(end, h + 90, 3),
    computePoint(end, h - 90, 3)
  ];
}

/* ============================================================
   FIDS
   ============================================================ */
async function fetchFIDS() {
  try {
    const rA = await fetch(FIDS_URL_ARR);
    const rD = await fetch(FIDS_URL_DEP);

    if (!rA.ok || !rD.ok) return { arrivals: [], departures: [] };

    LAST_FIDS = {
      arrivals: await rA.json(),
      departures: await rD.json()
    };

    return LAST_FIDS;
  } catch {
    return { arrivals: [], departures: [] };
  }
}

function applyFidsFilter(f) {
  let list = [];

  if (FIDS_FILTER === "all") list = [...f.arrivals, ...f.departures];
  else if (FIDS_FILTER === "dep") list = [...f.departures];
  else list = [...f.arrivals];

  return list
    .filter(v => v.status && v.status.toLowerCase().includes("confirm"))
    .slice(0, 10);
}

function updateFlightsUI(f) {
  const box = document.getElementById("flights-list");
  const list = applyFidsFilter(f);

  if (!list.length) {
    box.textContent = "Aucun vol.";
    return;
  }

  let html = `
    <table>
      <thead>
        <tr><th>Type</th><th>Vol</th><th>Orig/Dest</th><th>Heure</th></tr>
      </thead>
      <tbody>
  `;

  list.forEach(v => {
    html += `
      <tr>
        <td>${v.type || ""}</td>
        <td>${v.flight || ""}</td>
        <td>${v.origin || v.destination || ""}</td>
        <td>${v.time || v.sched || ""}</td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  box.innerHTML = html;
}

document.querySelectorAll("#fids-tabs span").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll("#fids-tabs span").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    FIDS_FILTER = tab.dataset.tab;
    LAST_FIDS && updateFlightsUI(LAST_FIDS);
  };
});

/* ============================================================
   METAR
   ============================================================ */
async function fetchMetar() {
  try {
    const r = await fetch(`https://avwx.rest/api/metar/${AVWX_ICAO}?token=${AVWX_TOKEN}`);
    if (!r.ok) return null;
    return await r.json();
  } catch {
    return null;
  }
}

function updateMetarUI(m) {
  const s = document.getElementById("meteo-summary");
  const r = document.getElementById("meteo-raw");

  if (!m) {
    s.textContent = "METAR indisponible";
    r.textContent = "";
    return;
  }

  s.innerHTML = `
    Vent : ${m.wind_direction?.repr || "///"}° ${m.wind_speed?.repr || "0"} kt<br>
    Temp : ${m.temperature?.repr || "N/A"}°C – QNH ${m.altimeter?.value || "N/A"} hPa
  `;

  r.textContent = m.raw || "";
}

/* ============================================================
   DÉTERMINATION DE LA PISTE
   ============================================================ */
function extractRunway(f) {
  const list = [...f.arrivals, ...f.departures];

  for (const v of list) {
    if (v.runway) {
      const n = v.runway.replace(/[^0-9]/g, "");
      const r = EBLG.runways.find(x => x.name === n);
      if (r) return r;
    }
  }
  return null;
}

function runwayFromMetar(m) {
  if (!m || !m.wind_direction?.value) return null;

  const dir = m.wind_direction.value;
  let best = null;

  EBLG.runways.forEach(r => {
    const diff = Math.abs(((r.heading - dir + 540) % 360) - 180);
    if (diff <= 15 && (!best || diff < best.diff)) best = { name: r.name, heading: r.heading, diff };
  });

  return best;
}
/* ============================================================
   COLORATION DES SONOMÈTRES SELON LA PISTE
   ============================================================ */
function updateSonoColors(rwy) {
  const impacted = [];

  SONOS.forEach(s => {
    const m = SONO_MARKERS[s.id];
    if (!m) return;

    let c = "#6b7280";     // gris par défaut
    if (rwy === "04") c = "#22c55e";   // vert
    if (rwy === "22") c = "#ef4444";   // rouge

    m.setStyle({ color: c, fillColor: c });
    impacted.push(s.id);
  });

  document.getElementById("sonos-impacted").textContent =
    impacted.length ? impacted.join(", ") : "Aucun";
}

/* ============================================================
   HEATMAP (impact sonomètres)
   ============================================================ */
function pointInPolygon(p, poly) {
  let x = p[1], y = p[0], inside = false;

  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    let xi = poly[i][1], yi = poly[i][0];
    let xj = poly[j][1], yj = poly[j][0];

    let intersect = ((yi > y) !== (yj > y)) &&
                    (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

    if (intersect) inside = !inside;
  }
  return inside;
}

function computeImpacted(h) {
  const poly = buildDepartureTrapezoid(h);
  const imp = [];

  SONOS.forEach(s => {
    if (pointInPolygon([s.lat, s.lon], poly))
      imp.push([s.lat, s.lon, 1]);
  });

  return imp;
}

function updateHeatmap(list) {
  if (heatLayer) {
    map.removeLayer(heatLayer);
    heatLayer = null;
  }
  if (!HEATMAP_ENABLED || !list.length) return;

  heatLayer = L.heatLayer(list, {
    radius: 25,
    blur: 15,
    maxZoom: 15
  }).addTo(map);
}

/* ============================================================
   OPTIONS DU CORRIDOR
   ============================================================ */
let SHOW_DEP = true;
let SHOW_ARR = true;
let SHOW_LABELS = true;
let SHOW_GRADIENT = true;

document.getElementById("chk-dep").onchange = e => { SHOW_DEP = e.target.checked; updateCorridor(); };
document.getElementById("chk-arr").onchange = e => { SHOW_ARR = e.target.checked; updateCorridor(); };
document.getElementById("chk-labels").onchange = e => { SHOW_LABELS = e.target.checked; updateCorridor(); };
document.getElementById("chk-gradient").onchange = e => { SHOW_GRADIENT = e.target.checked; updateCorridor(); };

/* ============================================================
   CORRIDOR (trapèzes + flèches + labels)
   ============================================================ */
function updateCorridor() {

  /* Nettoyage */
  if (departureLayer) { map.removeLayer(departureLayer); departureLayer = null; }
  if (arrivalLayer)   { map.removeLayer(arrivalLayer);   arrivalLayer   = null; }
  if (departureArrow) { map.removeLayer(departureArrow); departureArrow = null; }
  if (arrivalArrow)   { map.removeLayer(arrivalArrow);   arrivalArrow   = null; }

  if (!CORRIDOR_ENABLED || !lastHeading) return;

  const depPoly = buildDepartureTrapezoid(lastHeading);
  const arrPoly = buildArrivalTrapezoid((lastHeading + 180) % 360);

  /* Trapèze départ */
  if (SHOW_DEP) {
    departureLayer = L.polygon(depPoly, {
      color: "#eab308",
      weight: 1,
      fillOpacity: 1,
      fillColor: SHOW_GRADIENT ? "url(#grad-dep)" : "#eab308"
    }).addTo(map);
  }

  /* Trapèze arrivée */
  if (SHOW_ARR) {
    arrivalLayer = L.polygon(arrPoly, {
      color: "#7c3aed",
      weight: 1,
      fillOpacity: 1,
      fillColor: SHOW_GRADIENT ? "url(#grad-arr)" : "#7c3aed"
    }).addTo(map);
  }

  /* Points de référence */
  const depStart = lastHeading === 40 ? RWY04_START :
                   lastHeading === 220 ? RWY22_START :
                   [EBLG.lat, EBLG.lon];

  const arrEnd = lastHeading === 40 ? RWY04_END :
                 lastHeading === 220 ? RWY22_END :
                 [EBLG.lat, EBLG.lon];

  /* Labels DEP / ARR */
  if (SHOW_LABELS) {
    L.marker(
      computePoint(depStart, lastHeading, 1.2),
      { icon: L.divIcon({ html:`<div style="color:#eab308;font-weight:700;font-size:14px;text-shadow:0 0 3px white;">DEP</div>` }) }
    ).addTo(map);

    L.marker(
      computePoint(arrEnd, (lastHeading+180)%360, 1),
      { icon: L.divIcon({ html:`<div style="color:#7c3aed;font-weight:700;font-size:14px;text-shadow:0 0 3px white;">ARR</div>` }) }
    ).addTo(map);
  }

  /* Flèche départ */
  const depLine = L.polyline([
    computePoint(depStart, lastHeading, 0.5),
    computePoint(depStart, lastHeading, 6)
  ], { color:"#eab308", weight:0 }).addTo(map);

  departureArrow = L.polylineDecorator(depLine, {
    patterns: [{
      offset: "100%",
      repeat: 0,
      symbol: L.Symbol.arrowHead({
        pixelSize: 12,
        polygon: true,
        pathOptions: { color:"#eab308", weight:2, fillOpacity:1 }
      })
    }]
  }).addTo(map);

  /* Flèche arrivée */
  const arrLine = L.polyline([
    computePoint(arrEnd, (lastHeading+180)%360, 0.5),
    computePoint(arrEnd, (lastHeading+180)%360, 3)
  ], { color:"#7c3aed", weight:0 }).addTo(map);

  arrivalArrow = L.polylineDecorator(arrLine, {
    patterns: [{
      offset: "100%",
      repeat: 0,
      symbol: L.Symbol.arrowHead({
        pixelSize: 10,
        polygon: true,
        pathOptions: { color:"#7c3aed", weight:2, fillOpacity:1 }
      })
    }]
  }).addTo(map);

  /* Texte panneau corridor */
  document.getElementById("corridor-info").innerHTML =
    lastRunway
      ? `Piste : ${lastRunway} – cap ${lastHeading}°`
      : `Piste indéterminée – corridor affiché par défaut sur 22`;
}

/* ============================================================
   ADS‑B (positions avions)
   ============================================================ */
async function fetchADSB() {
  try {
    const r = await fetch(ADSB_URL);
    if (!r.ok) throw 0;
    const d = await r.json();
    return d.states || [];
  } catch {
    return [];
  }
}

let ADSB_MARKERS = {};
let ADSB_BY_CALLSIGN = {};
let TRACK_HISTORY = {};
let TRACK_LAYERS = {};
let TRACK_DECORATORS = {};
let SELECTED_PLANE = null;

const normalizeCallsign = t => t ? String(t).trim().toUpperCase() : null;

const PLANE_ICON_SVG = `
<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
  <path d="M2.5 19l8.5-7-8.5-7v4.5l5 2.5-5 2.5V19zm9.5 0l8.5-7-8.5-7v4.5l5 2.5-5 2.5V19z"/>
</svg>`;

/* Icône avion orientée */
function planeIconFor(track, color) {
  return L.divIcon({
    className: "plane-icon",
    html: `<div style="transform:rotate(${track.heading||0}deg);color:${color};">${PLANE_ICON_SVG}</div>`,
    iconSize: [24,24],
    iconAnchor: [12,12]
  });
}

/* Mise à jour ADS‑B */
function updateADSB(states) {
  const seen = new Set();

  states.forEach(s => {
    const cs = normalizeCallsign(s[1] || s[0]);
    const lat = s[6], lon = s[5];
    const heading = s[10] || 0;

    if (!cs || lat == null || lon == null) return;

    seen.add(cs);
    const pos = [lat, lon];
    const color = "#eab308";

    if (!ADSB_MARKERS[cs]) {
      const m = L.marker(pos, { icon: planeIconFor({heading}, color) }).addTo(map);
      m.on("click", () => { SELECTED_PLANE = cs; showPlaneInfo(cs); });
      ADSB_MARKERS[cs] = m;
    } else {
      ADSB_MARKERS[cs].setLatLng(pos);
      ADSB_MARKERS[cs].setIcon(planeIconFor({heading}, color));
    }

    ADSB_BY_CALLSIGN[cs] = {
      callsign: cs,
      icao: s[0],
      lat, lon,
      altitude: s[7],
      speed: s[9],
      verticalRate: s[11],
      heading,
      onGround: !!s[8],
      lastSeen: Date.now()
    };
  });

  /* Suppression avions disparus */
  Object.keys(ADSB_MARKERS).forEach(cs => {
    if (!seen.has(cs)) {
      map.removeLayer(ADSB_MARKERS[cs]);
      delete ADSB_MARKERS[cs];
      delete ADSB_BY_CALLSIGN[cs];
      delete TRACK_HISTORY[cs];

      if (TRACK_LAYERS[cs]) { map.removeLayer(TRACK_LAYERS[cs]); delete TRACK_LAYERS[cs]; }
      if (TRACK_DECORATORS[cs]) { map.removeLayer(TRACK_DECORATORS[cs]); delete TRACK_DECORATORS[cs]; }

      if (SELECTED_PLANE === cs) {
        SELECTED_PLANE = null;
        hidePlaneInfo();
      }
    }
  });

  updateTracks(states);
}

/* ============================================================
   TRAJECTOIRES ADS‑B
   ============================================================ */
function updateTracks(states) {

  if (!TRACKS_ENABLED) {
    Object.values(TRACK_LAYERS).forEach(l => map.removeLayer(l));
    Object.values(TRACK_DECORATORS).forEach(d => map.removeLayer(d));
    TRACK_LAYERS = {};
    TRACK_DECORATORS = {};
    TRACK_HISTORY = {};
    return;
  }

  states.forEach(s => {
    const cs = normalizeCallsign(s[1] || s[0]);
    const lat = s[6], lon = s[5];
    if (!cs || lat == null || lon == null) return;

    TRACK_HISTORY[cs] ||= [];
    TRACK_HISTORY[cs].push([lat, lon]);
    if (TRACK_HISTORY[cs].length > 60) TRACK_HISTORY[cs].shift();

    if (TRACK_LAYERS[cs]) { map.removeLayer(TRACK_LAYERS[cs]); delete TRACK_LAYERS[cs]; }
    if (TRACK_DECORATORS[cs]) { map.removeLayer(TRACK_DECORATORS[cs]); delete TRACK_DECORATORS[cs]; }

    const poly = L.polyline(TRACK_HISTORY[cs], {
      color: "#7c3aed",
      weight: 2,
      opacity: 0.7
    }).addTo(map);

    TRACK_LAYERS[cs] = poly;

    const deco = L.polylineDecorator(poly, {
      patterns: [{
        offset: "100%",
        repeat: 0,
        symbol: L.Symbol.arrowHead({
          pixelSize: 10,
          polygon: false,
          pathOptions: { color:"#7c3aed", weight:2 }
        })
      }]
    }).addTo(map);

    TRACK_DECORATORS[cs] = deco;
  });
}
/* ============================================================
   COLORATION DES SONOMÈTRES SELON LA PISTE
   ============================================================ */
function updateSonoColors(rwy) {
  const impacted = [];

  SONOS.forEach(s => {
    const m = SONO_MARKERS[s.id];
    if (!m) return;

    let c = "#6b7280";     // gris par défaut
    if (rwy === "04") c = "#22c55e";   // vert
    if (rwy === "22") c = "#ef4444";   // rouge

    m.setStyle({ color: c, fillColor: c });
    impacted.push(s.id);
  });

  document.getElementById("sonos-impacted").textContent =
    impacted.length ? impacted.join(", ") : "Aucun";
}

/* ============================================================
   HEATMAP (impact sonomètres)
   ============================================================ */
function pointInPolygon(p, poly) {
  let x = p[1], y = p[0], inside = false;

  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    let xi = poly[i][1], yi = poly[i][0];
    let xj = poly[j][1], yj = poly[j][0];

    let intersect = ((yi > y) !== (yj > y)) &&
                    (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

    if (intersect) inside = !inside;
  }
  return inside;
}

function computeImpacted(h) {
  const poly = buildDepartureTrapezoid(h);
  const imp = [];

  SONOS.forEach(s => {
    if (pointInPolygon([s.lat, s.lon], poly))
      imp.push([s.lat, s.lon, 1]);
  });

  return imp;
}

function updateHeatmap(list) {
  if (heatLayer) {
    map.removeLayer(heatLayer);
    heatLayer = null;
  }
  if (!HEATMAP_ENABLED || !list.length) return;

  heatLayer = L.heatLayer(list, {
    radius: 25,
    blur: 15,
    maxZoom: 15
  }).addTo(map);
}

/* ============================================================
   OPTIONS DU CORRIDOR
   ============================================================ */
let SHOW_DEP = true;
let SHOW_ARR = true;
let SHOW_LABELS = true;
let SHOW_GRADIENT = true;

document.getElementById("chk-dep").onchange = e => { SHOW_DEP = e.target.checked; updateCorridor(); };
document.getElementById("chk-arr").onchange = e => { SHOW_ARR = e.target.checked; updateCorridor(); };
document.getElementById("chk-labels").onchange = e => { SHOW_LABELS = e.target.checked; updateCorridor(); };
document.getElementById("chk-gradient").onchange = e => { SHOW_GRADIENT = e.target.checked; updateCorridor(); };

/* ============================================================
   CORRIDOR (trapèzes + flèches + labels)
   ============================================================ */
function updateCorridor() {

  /* Nettoyage */
  if (departureLayer) { map.removeLayer(departureLayer); departureLayer = null; }
  if (arrivalLayer)   { map.removeLayer(arrivalLayer);   arrivalLayer   = null; }
  if (departureArrow) { map.removeLayer(departureArrow); departureArrow = null; }
  if (arrivalArrow)   { map.removeLayer(arrivalArrow);   arrivalArrow   = null; }

  if (!CORRIDOR_ENABLED || !lastHeading) return;

  const depPoly = buildDepartureTrapezoid(lastHeading);
  const arrPoly = buildArrivalTrapezoid((lastHeading + 180) % 360);

  /* Trapèze départ */
  if (SHOW_DEP) {
    departureLayer = L.polygon(depPoly, {
      color: "#eab308",
      weight: 1,
      fillOpacity: 1,
      fillColor: SHOW_GRADIENT ? "url(#grad-dep)" : "#eab308"
    }).addTo(map);
  }

  /* Trapèze arrivée */
  if (SHOW_ARR) {
    arrivalLayer = L.polygon(arrPoly, {
      color: "#7c3aed",
      weight: 1,
      fillOpacity: 1,
      fillColor: SHOW_GRADIENT ? "url(#grad-arr)" : "#7c3aed"
    }).addTo(map);
  }

  /* Points de référence */
  const depStart = lastHeading === 40 ? RWY04_START :
                   lastHeading === 220 ? RWY22_START :
                   [EBLG.lat, EBLG.lon];

  const arrEnd = lastHeading === 40 ? RWY04_END :
                 lastHeading === 220 ? RWY22_END :
                 [EBLG.lat, EBLG.lon];

  /* Labels DEP / ARR */
  if (SHOW_LABELS) {
    L.marker(
      computePoint(depStart, lastHeading, 1.2),
      { icon: L.divIcon({ html:`<div style="color:#eab308;font-weight:700;font-size:14px;text-shadow:0 0 3px white;">DEP</div>` }) }
    ).addTo(map);

    L.marker(
      computePoint(arrEnd, (lastHeading+180)%360, 1),
      { icon: L.divIcon({ html:`<div style="color:#7c3aed;font-weight:700;font-size:14px;text-shadow:0 0 3px white;">ARR</div>` }) }
    ).addTo(map);
  }

  /* Flèche départ */
  const depLine = L.polyline([
    computePoint(depStart, lastHeading, 0.5),
    computePoint(depStart, lastHeading, 6)
  ], { color:"#eab308", weight:0 }).addTo(map);

  departureArrow = L.polylineDecorator(depLine, {
    patterns: [{
      offset: "100%",
      repeat: 0,
      symbol: L.Symbol.arrowHead({
        pixelSize: 12,
        polygon: true,
        pathOptions: { color:"#eab308", weight:2, fillOpacity:1 }
      })
    }]
  }).addTo(map);

  /* Flèche arrivée */
  const arrLine = L.polyline([
    computePoint(arrEnd, (lastHeading+180)%360, 0.5),
    computePoint(arrEnd, (lastHeading+180)%360, 3)
  ], { color:"#7c3aed", weight:0 }).addTo(map);

  arrivalArrow = L.polylineDecorator(arrLine, {
    patterns: [{
      offset: "100%",
      repeat: 0,
      symbol: L.Symbol.arrowHead({
        pixelSize: 10,
        polygon: true,
        pathOptions: { color:"#7c3aed", weight:2, fillOpacity:1 }
      })
    }]
  }).addTo(map);

  /* Texte panneau corridor */
  document.getElementById("corridor-info").innerHTML =
    lastRunway
      ? `Piste : ${lastRunway} – cap ${lastHeading}°`
      : `Piste indéterminée – corridor affiché par défaut sur 22`;
}

/* ============================================================
   ADS‑B (positions avions)
   ============================================================ */
async function fetchADSB() {
  try {
    const r = await fetch(ADSB_URL);
    if (!r.ok) throw 0;
    const d = await r.json();
    return d.states || [];
  } catch {
    return [];
  }
}

let ADSB_MARKERS = {};
let ADSB_BY_CALLSIGN = {};
let TRACK_HISTORY = {};
let TRACK_LAYERS = {};
let TRACK_DECORATORS = {};
let SELECTED_PLANE = null;

const normalizeCallsign = t => t ? String(t).trim().toUpperCase() : null;

const PLANE_ICON_SVG = `
<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
  <path d="M2.5 19l8.5-7-8.5-7v4.5l5 2.5-5 2.5V19zm9.5 0l8.5-7-8.5-7v4.5l5 2.5-5 2.5V19z"/>
</svg>`;

/* Icône avion orientée */
function planeIconFor(track, color) {
  return L.divIcon({
    className: "plane-icon",
    html: `<div style="transform:rotate(${track.heading||0}deg);color:${color};">${PLANE_ICON_SVG}</div>`,
    iconSize: [24,24],
    iconAnchor: [12,12]
  });
}

/* Mise à jour ADS‑B */
function updateADSB(states) {
  const seen = new Set();

  states.forEach(s => {
    const cs = normalizeCallsign(s[1] || s[0]);
    const lat = s[6], lon = s[5];
    const heading = s[10] || 0;

    if (!cs || lat == null || lon == null) return;

    seen.add(cs);
    const pos = [lat, lon];
    const color = "#eab308";

    if (!ADSB_MARKERS[cs]) {
      const m = L.marker(pos, { icon: planeIconFor({heading}, color) }).addTo(map);
      m.on("click", () => { SELECTED_PLANE = cs; showPlaneInfo(cs); });
      ADSB_MARKERS[cs] = m;
    } else {
      ADSB_MARKERS[cs].setLatLng(pos);
      ADSB_MARKERS[cs].setIcon(planeIconFor({heading}, color));
    }

    ADSB_BY_CALLSIGN[cs] = {
      callsign: cs,
      icao: s[0],
      lat, lon,
      altitude: s[7],
      speed: s[9],
      verticalRate: s[11],
      heading,
      onGround: !!s[8],
      lastSeen: Date.now()
    };
  });

  /* Suppression avions disparus */
  Object.keys(ADSB_MARKERS).forEach(cs => {
    if (!seen.has(cs)) {
      map.removeLayer(ADSB_MARKERS[cs]);
      delete ADSB_MARKERS[cs];
      delete ADSB_BY_CALLSIGN[cs];
      delete TRACK_HISTORY[cs];

      if (TRACK_LAYERS[cs]) { map.removeLayer(TRACK_LAYERS[cs]); delete TRACK_LAYERS[cs]; }
      if (TRACK_DECORATORS[cs]) { map.removeLayer(TRACK_DECORATORS[cs]); delete TRACK_DECORATORS[cs]; }

      if (SELECTED_PLANE === cs) {
        SELECTED_PLANE = null;
        hidePlaneInfo();
      }
    }
  });

  updateTracks(states);
}

/* ============================================================
   TRAJECTOIRES ADS‑B
   ============================================================ */
function updateTracks(states) {

  if (!TRACKS_ENABLED) {
    Object.values(TRACK_LAYERS).forEach(l => map.removeLayer(l));
    Object.values(TRACK_DECORATORS).forEach(d => map.removeLayer(d));
    TRACK_LAYERS = {};
    TRACK_DECORATORS = {};
    TRACK_HISTORY = {};
    return;
  }

  states.forEach(s => {
    const cs = normalizeCallsign(s[1] || s[0]);
    const lat = s[6], lon = s[5];
    if (!cs || lat == null || lon == null) return;

    TRACK_HISTORY[cs] ||= [];
    TRACK_HISTORY[cs].push([lat, lon]);
    if (TRACK_HISTORY[cs].length > 60) TRACK_HISTORY[cs].shift();

    if (TRACK_LAYERS[cs]) { map.removeLayer(TRACK_LAYERS[cs]); delete TRACK_LAYERS[cs]; }
    if (TRACK_DECORATORS[cs]) { map.removeLayer(TRACK_DECORATORS[cs]); delete TRACK_DECORATORS[cs]; }

    const poly = L.polyline(TRACK_HISTORY[cs], {
      color: "#7c3aed",
      weight: 2,
      opacity: 0.7
    }).addTo(map);

    TRACK_LAYERS[cs] = poly;

    const deco = L.polylineDecorator(poly, {
      patterns: [{
        offset: "100%",
        repeat: 0,
        symbol: L.Symbol.arrowHead({
          pixelSize: 10,
          polygon: false,
          pathOptions: { color:"#7c3aed", weight:2 }
        })
      }]
    }).addTo(map);

    TRACK_DECORATORS[cs] = deco;
  });
}
/* ============================================================
   PANNEAU AVION SÉLECTIONNÉ
   ============================================================ */
function showPlaneInfo(cs) {
  const info = ADSB_BY_CALLSIGN[cs];
  const box = document.getElementById("plane-info");

  if (!info) {
    box.style.display = "none";
    return;
  }

  const hue = (info.heading || 0) % 360;
  const color = `hsl(${hue}, 80%, 55%)`;

  box.style.borderLeftColor = color;
  box.style.display = "block";

  box.innerHTML = `
    <div style="font-weight:600;margin-bottom:.25rem;">
      <span style="color:${color};margin-right:.25rem;">${PLANE_ICON_SVG}</span>
      ${info.callsign || info.icao}
    </div>
    Latitude : ${info.lat?.toFixed(4)}<br>
    Longitude : ${info.lon?.toFixed(4)}<br>
    Altitude : ${info.altitude || "N/A"} ft<br>
    Vitesse sol : ${info.speed || "N/A"} kt<br>
    Taux vertical : ${info.verticalRate || "N/A"} ft/min<br>
    Cap : ${info.heading || "N/A"}°<br>
    Sol : ${info.onGround ? "Oui" : "Non"}<br>
    Dernière mise à jour : ${new Date(info.lastSeen).toLocaleTimeString()}
  `;
}

function hidePlaneInfo() {
  document.getElementById("plane-info").style.display = "none";
}

/* ============================================================
   BOUTONS HEADER
   ============================================================ */
document.getElementById("toggle-tracks").onclick = e => {
  TRACKS_ENABLED = !TRACKS_ENABLED;
  e.target.textContent = "Trajectoires : " + (TRACKS_ENABLED ? "ON" : "OFF");
};

document.getElementById("toggle-heatmap").onclick = e => {
  HEATMAP_ENABLED = !HEATMAP_ENABLED;
  e.target.textContent = "Heatmap : " + (HEATMAP_ENABLED ? "ON" : "OFF");
};

document.getElementById("toggle-corridor").onclick = e => {
  CORRIDOR_ENABLED = !CORRIDOR_ENABLED;
  e.target.textContent = "Corridor : " + (CORRIDOR_ENABLED ? "ON" : "OFF");
  updateCorridor();
};

document.getElementById("toggle-sonos").onclick = e => {
  SONOS_ENABLED = !SONOS_ENABLED;
  e.target.textContent = "Sonomètres : " + (SONOS_ENABLED ? "ON" : "OFF");

  Object.values(SONO_MARKERS).forEach(m =>
    m.setStyle({
      opacity: SONOS_ENABLED ? 1 : 0,
      fillOpacity: SONOS_ENABLED ? 0.9 : 0
    })
  );
};

document.getElementById("reset-map").onclick = () =>
  map.setView([EBLG.lat, EBLG.lon], 11);

/* ============================================================
   BOUCLE PRINCIPALE (METAR + FIDS + ADSB + CORRIDOR)
   ============================================================ */
async function refresh() {

  /* METAR */
  const metar = await fetchMetar();
  updateMetarUI(metar);

  /* FIDS */
  const fids = await fetchFIDS();
  updateFlightsUI(fids);

  /* Détermination piste */
  const rwF = extractRunway(fids);
  const rwM = runwayFromMetar(metar);
  const rw  = rwF || rwM;

  if (!rw) {
    lastHeading = 220;
    lastRunway  = null;
    document.getElementById("runway-info").textContent =
      "Piste active : indéterminée (fallback 22)";
  } else {
    lastHeading = rw.heading;
    lastRunway  = rw.name;
    document.getElementById("runway-info").textContent =
      `Piste active : ${rw.name} (cap ${rw.heading}°)`;
  }

  /* Sonomètres */
  if (lastRunway) updateSonoColors(lastRunway);

  /* Heatmap */
  const impacted = rw ? computeImpacted(rw.heading) : computeImpacted(220);
  updateHeatmap(impacted);

  /* Corridor */
  updateCorridor();

  /* ADS-B */
  const adsb = await fetchADSB();
  updateADSB(adsb);
}

/* Rafraîchissement toutes les 5 secondes */
setInterval(refresh, 5000);
refresh();
</script>
