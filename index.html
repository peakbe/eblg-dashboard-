/* ================================
   GEO UTILS
================================ */
const toRad=d=>d*Math.PI/180, toDeg=r=>180*r/Math.PI;

function computePoint([lat,lon],hd,km){
  const R=6371, d=km/R, h=toRad(hd), la=toRad(lat), lo=toRad(lon);
  const la2=Math.asin(Math.sin(la)*Math.cos(d)+Math.cos(la)*Math.sin(d)*Math.cos(h));
  const lo2=lo+Math.atan2(Math.sin(h)*Math.sin(d)*Math.cos(la),
         Math.cos(d)-Math.sin(la)*Math.sin(la2));
  return[toDeg(la2),toDeg(lo2)];
}

function distanceKm(a,b,c,d){
  const R=6371,dl=toRad(c-a),dn=toRad(d-b);
  const h=Math.sin(dl/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dn/2)**2;
  return 2*R*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));
}

function distancePointToSegmentKm(p,A,B){
  const kx=111*Math.cos(toRad((A[0]+B[0])/2)), ky=111;
  const px=(p[1]-A[1])*kx, py=(p[0]-A[0])*ky;
  const bx=(B[1]-A[1])*kx, by=(B[0]-A[0])*ky;
  const t=Math.max(0,Math.min(1,(px*bx+py*by)/(bx*bx+by*by||1)));
  const qx=t*bx, qy=t*by;
  return Math.sqrt((px-qx)**2+(py-qy)**2);
}

function pointInPolygon([x,y],poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const[xi,yi]=poly[i],[xj,yj]=poly[j];
    const inter=yi>y!=yj>y && x<(xj-xi)*(y-yi)/(yj-yi+1e-12)+xi;
    if(inter) inside=!inside;
  }
  return inside;
}

 computePoint(RWY04_END,  RWY04_HEADING-90,RWY_HALF_WIDTH_KM),
 computePoint(RWY04_END,  RWY04_HEADING+90,RWY_HALF_WIDTH_KM),
 computePoint(RWY04_START,RWY04_HEADING+90,RWY_HALF_WIDTH_KM)];

 computePoint(RWY22_START,RWY22_HEADING+90,RWY_HALF_WIDTH_KM)];

function buildExtendedCenterlinePoly(start,hd,w,l){
  const end=computePoint(start,hd,l);

    computePoint(end,hd-90,w),
    computePoint(end,hd+90,w),

}

/* ================================
   ICÔNE AVION — Option C (FIDS prioritaire)
================================ */
const HEAD_TOL=15;
function planeIconFor(callsign,track){
  const norm=normalizeCallsign(callsign||"");
  let kind=null;

  if(LAST_FIDS){
    const arr=(LAST_FIDS.arrivals||[]).find(
      v=>normalizeCallsign(v.flightPax||v.flight||v.callsign)===norm);
    const dep=(LAST_FIDS.departures||[]).find(
      v=>normalizeCallsign(v.flightPax||v.flight||v.callsign)===norm);
    if(dep) kind="DEP"; else if(arr) kind="ARR";
  }

  if(!kind){
    if(track!=null){
      const d04=Math.min(Math.abs(track-40),360-Math.abs(track-40));
      const d22=Math.min(Math.abs(track-220),360-Math.abs(track-220));
      kind=(d04<=HEAD_TOL || d22<=HEAD_TOL)?"DEP":"ARR";
    }else kind="ARR";
  }

  return kind==="DEP"
    ? PLANE_DEP(track||0)
    : PLANE_ARR(track||0);
}

/* ================================
   ADS-B (markers + tracks)
================================ */
let ADSB_MARKERS={},ADSB_TRACKS={};

async function fetchADSB(){
  const url="https://opensky-network.org/api/states/all?lamin=50.3&lomin=5.1&lamax=50.9&lomax=5.8";
  try{const r=await fetch(url);const j=await r.json();return j.states||[]}catch(e){return[]}
}

function updateADSB(states){
  states.forEach(s=>{
    const icao=s[0], cs=(s[1]||"").trim(), lon=s[5], lat=s[6], track=s[10]||0;
    if(lat==null||lon==null) return;

    if(!ADSB_MARKERS[icao]){
      ADSB_MARKERS[icao]=L.marker([lat,lon],{icon:planeIconFor(cs,track)})
        .addTo(map)
        .bindPopup(`ICAO: ${icao}<br>Callsign: ${cs}`);
    }else{
      ADSB_MARKERS[icao].setLatLng([lat,lon]);
      ADSB_MARKERS[icao].setIcon(planeIconFor(cs,track));
    }

    if(!ADSB_TRACKS[icao]) ADSB_TRACKS[icao]=[];
    ADSB_TRACKS[icao].push([lat,lon]);
    if(ADSB_TRACKS[icao].length>40) ADSB_TRACKS[icao].shift();

    if(ADSB_TRACKS[icao].poly){
      map.removeLayer(ADSB_TRACKS[icao].poly);
      ADSB_TRACKS[icao].poly=null;
    }
    if(TRACKS_ENABLED){
      ADSB_TRACKS[icao].poly=L.polyline(ADSB_TRACKS[icao],
        {color:"#fbbf24",weight:2}).addTo(map);
    }

    const norm=normalizeCallsign(cs);
    if(norm){
      ADSB_BY_CALLSIGN[norm]={icao,marker:ADSB_MARKERS[icao]};
      ADSB_MARKERS[icao].off("click");
      ADSB_MARKERS[icao].on("click",()=>{
        if(!LAST_FIDS) return;
        const all=[...(LAST_FIDS.arrivals||[]),...(LAST_FIDS.departures||[])];
        const match=all.find(v=>normalizeCallsign(v.flightPax||v.flight||v.callsign)===norm);
        if(match) showFlightDetail(match);
      });
    }
  });

  detectTakeoff04(states);
  detectTakeoff22(states);
  if(lastRunway) colorSonoByRunway(lastRunway);
  updateF017Icon();
  annotateFlightsWithADSB();
}

function hideAllTracks(){
  Object.values(ADSB_TRACKS).forEach(t=>{

}

function annotateFlightsWithADSB(){
  try{
    const el=document.getElementById("flights-list"); if(!el)return;
    el.querySelectorAll(".flight-row").forEach(row=>{
      const norm=row.getAttribute("data-normcallsign"),
            badge=row.querySelector(".adsb-badge"),
            ok=norm && !!ADSB_BY_CALLSIGN[norm];
      if(badge){
        badge.textContent=ok?"ADS‑B OK":"—";
        badge.style.background=ok?"#10b981":"#d1d5db";
        badge.style.color=ok?"#fff":"#111";
      }
    });
  }catch(e){}
}

function focusAircraftByCallsign(norm,flight){
  const hit=norm?ADSB_BY_CALLSIGN[norm]:null;
  if(hit&&hit.marker){
    const mk=hit.marker,ll=mk.getLatLng();
    map.setView(ll,13); mk.openPopup();
    const ping=L.circle(ll,{radius:150,color:"#22c55e",weight:2,fillOpacity:.1});
    ping.addTo(map); setTimeout(()=>map.removeLayer(ping),2500);
  }else highlightFlightOnMap(flight);
}

  const dep=await fetch(URL_DEP).then(r=>r.json()).catch(()=>[]);
  return {
    arrivals:Array.isArray(arr)?arr:[],
    departures:Array.isArray(dep)?dep:[]
  };
}

function setFilter(f){FLT_FILTER=f;refresh();}

function updateFlightsUI(f){
  LAST_FIDS=f;
  const el=document.getElementById("flights-list"); let all=[...f.arrivals,...f.departures];

  if(FLT_FILTER==="ARR") all=all.filter(v=>v.direction==="Arrivals");
  if(FLT_FILTER==="DEP") all=all.filter(v=>v.direction==="Departures");

  all.sort((a,b)=>new Date(a.sTx)-new Date(b.sTx)); all=all.slice(0,10);

  if(!all.length){ el.textContent="Aucun vol."; return; }

  el.innerHTML=all.map(v=>{
    const raw=v.flightPax||v.flight||v.callsign||"",
          norm=normalizeCallsign(raw),
          has=norm && !!ADSB_BY_CALLSIGN[norm],
          rwy=v.runway||"?";
    return `
<div class="flight-row" data-id="${v.id}" data-normcallsign="${norm}">
  ${v.direction==="Arrivals"?"ARR":"DEP"} ${raw} (${v.aircraftType}) – RWY ${rwy}
  <span class="tag adsb-badge" style="margin-left:6px;${has?'background:#10b981;color:#fff;':''}">
    ${has?'ADS‑B OK':'—'}
  </span><br>${formatLocal(v.sTx)} → ${formatLocal(v.eTx)}
</div>`;
  }).join("");

  el.querySelectorAll(".flight-row").forEach(row=>{
    row.onclick=()=>{
      const id=row.getAttribute("data-id"),
            norm=row.getAttribute("data-normcallsign"),
            flight=all.find(v=>v.id===id);
      if(flight) showFlightDetail(flight);
      focusAircraftByCallsign(norm,flight);
    };
  });

  annotateFlightsWithADSB();
}

function showFlightDetail(v){
  document.getElementById("flight-detail").innerHTML=
   `<strong>${v.flightPax}</strong> – ${v.aircraftType}<br>
    ${v.origin} → ${v.destination}<br>
    Piste : ${v.runway||"-"}<br>
    STD/STA : ${formatLocal(v.sTx)}<br>
    ETD/ETA : ${formatLocal(v.eTx)}<br>
    ATD/ATA : ${formatLocal(v.aTx)}<br>
    Stand : ${v.stand||"-"}<br>
    Opérateur : ${v.operator||"-"}`
}

function highlightFlightOnMap(v){
  if(!v)return;
  const pos=[EBLG.lat+0.005,EBLG.lon+0.005];
  if(window.flightMarker) map.removeLayer(window.flightMarker);
  window.flightMarker=L.circleMarker(pos,{radius:10,color:"#f97316",fillColor:"#f97316",fillOpacity:.9})
    .addTo(map).bindPopup(`Vol ${v.flightPax}`);
  map.setView(pos,13);
}

/* ================================
   RUNWAY + COULOIR + HEATMAP + SONOS
================================ */
function extractRunway(f){
  const all=[...f.arrivals,...f.departures], r=all.find(v=>v.runway);
  if(!r) return null;
  const name=r.runway.replace(/[^0-9]/g,"");
  return EBLG.runways.find(x=>x.name===name)||null;
}

function runwayFromMetar(m){
  if(!m||!m.wind_direction||m.wind_direction.value==null)return null;
  const wd=m.wind_direction.value;
  let best=null,bestDiff=999;
  EBLG.runways.forEach(rw=>{
    const d=Math.min(Math.abs(wd-rw.heading),360-Math.abs(wd-rw.heading));
    if(d<bestDiff){bestDiff=d;best=rw;}
  });
  return best;
}

function buildCorridor(h){
  const start=[EBLG.lat,EBLG.lon], end=computePoint(start,h,20);
  const lS=computePoint(start,h-90,1.5), rS=computePoint(start,h+90,1.5);
  const lE=computePoint(end,h-90,3.5),  rE=computePoint(end,h+90,3.5);
  return[lS,lE,rE,rS];
}

function colorSonoByRunway(rwy){
  SONO_MARKERS.forEach(s=>{
    let style={color:COLOR.gray,fillColor:COLOR.gray};

    if(s.id==="F017"){
      if(rwy==="04"&&IS_TAKEOFF_04) style={color:COLOR.red,fillColor:COLOR.red};
      else if(rwy==="22"&&!IS_TAKEOFF_22) style={color:COLOR.green,fillColor:COLOR.green};
      else if(rwy==="04"&&!IS_TAKEOFF_04) style={color:COLOR.green,fillColor:COLOR.green};
      s.marker.setStyle({...style,fillOpacity:1}); return;
    }

    if(rwy==="22"){
      if(IS_TAKEOFF_22 && RW22_TKOFF_GREEN.has(s.id))
        style={color:COLOR.green,fillColor:COLOR.green};
    }else if(rwy==="04"){
      if(IS_TAKEOFF_04){
        if(RW04_BOTH_GREEN.has(s.id))
          style={color:COLOR.green,fillColor:COLOR.green};
      }else{
        if(RW04_LDG_GREEN.has(s.id)||RW04_BOTH_GREEN.has(s.id))
          style={color:COLOR.green,fillColor:COLOR.green};
        else if(RW04_LDG_IMP_RED.has(s.id))
          style={color:COLOR.red,fillColor:COLOR.red};
      }
    }
    s.marker.setStyle({...style,fillOpacity:1});
  });
}

function computeImpacted(h){
  const poly=buildCorridor(h);
  if(corridorLayer) map.removeLayer(corridorLayer);
  if(CORRIDOR_ENABLED)
    corridorLayer=L.polygon(poly,{color:"#f97316",weight:2,fillOpacity:.15}).addTo(map);
  else corridorLayer=null;

  const impacted=[];
  SONO_MARKERS.forEach(s=>{
    if(L.polygon(poly).getBounds().contains([s.lat,s.lon])) impacted.push(s);
  });
  return impacted;
}

function updateHeatmap(imp){
  if(!HEATMAP_ENABLED){
    if(heatLayer){map.removeLayer(heatLayer);heatLayer=null;} return;
  }
  const pts=SONOS.map(s=>[s.lat,s.lon,imp.find(i=>i.id===s.id)?1.5:0.3]);
  if(heatLayer) map.removeLayer(heatLayer);
  if(window.L && L.heatLayer)
    heatLayer=L.heatLayer(pts,{radius:40,blur:25,maxZoom:12}).addTo(map);
}

/* ================================
   DIAPASON (SignalR) + LED + RECO
================================ */
const HUB_URL="https://eblg.aerovision.cloud/EBLG/signal-noise";
const SENSOR_MAP={
 1:"F001",2:"F002",3:"F003",4:"F004",5:"F005",
 6:"F006",7:"F007",8:"F008",9:"F009",10:"F010",
 11:"F011",12:"F012",13:"F013",14:"F014",
 15:"F015",16:"F016",17:"F017"
};

let LIVE_NOISE={},HISTORY_DURATION_MS=5*60*1000,NOISE_HISTORY={};
SONOS.forEach(s=>NOISE_HISTORY[s.id]=[]);
let CHARTS={},DIAPASON_CONNECTED=false,LAST_NOISE_TS=0;

/* ---- LED ---- */
function setDiaLED(ok){
  const led=document.getElementById("dia-led"),
        lbl=document.getElementById("dia-text");
  if(ok==="reconnecting"){
    if(led) led.style.background="#f59e0b";
    if(lbl) lbl.textContent="Diapason : reconnexion…";
  }else if(ok===true){
    if(led) led.style.background="#10b981";
    if(lbl) lbl.textContent="Diapason : connecté";
  }else{
    if(led) led.style.background="#ef4444";
    if(lbl) lbl.textContent="Diapason : déconnecté";
  }
}

/* ---- Connection builder ---- */
function buildConnection(transport,skipNeg){
  return new signalR.HubConnectionBuilder()
    .withUrl(HUB_URL,{transport:transport,skipNegotiation:skipNeg})
    .withAutomaticReconnect({
      nextRetryDelayInMilliseconds:c=>c.previousRetryCount<1?0:
        c.previousRetryCount<2?2000:
        c.previousRetryCount<3?5000:
        c.previousRetryCount<4?10000:30000
    }).configureLogging(signalR.LogLevel.Information)
    .build();
}

let connection=buildConnection(signalR.HttpTransportType.WebSockets,true);
connection.serverTimeoutInMilliseconds=30000;
connection.keepAliveIntervalInMilliseconds=10000;

/* ---- Reconnect events ---- */
connection.onreconnecting(err=>{
  console.warn("[Diapason] Reconnecting…",err);
  DIAPASON_CONNECTED=false; setDiaLED("reconnecting");
});
connection.onreconnected(()=>{
  console.info("[Diapason] Reconnected");
  DIAPASON_CONNECTED=true; setDiaLED(true);
});
connection.onclose(err=>{
  console.error("[Diapason] Closed",err);
  DIAPASON_CONNECTED=false; setDiaLED(false);
});

/* ---- Handler bruit ---- */
function onNoiseMeasure(sensorId,payload){
  LAST_NOISE_TS=Date.now();
  const fId=SENSOR_MAP[sensorId]||`ID_${sensorId}`;
  LIVE_NOISE[fId]={laeq:payload.value,t:new Date(payload.timeStamp).toISOString()};

  const now=Date.now();
  NOISE_HISTORY[fId].push({t:now,v:payload.value});
  NOISE_HISTORY[fId]=NOISE_HISTORY[fId].filter(p=>now-p.t<=HISTORY_DURATION_MS);

  updateHistoryChart(fId);
  updateNoiseUI(Object.entries(LIVE_NOISE).map(([id,v])=>({id,laeq:v.laeq,t:v.t})));

  const span=document.getElementById(`lv_${fId}`);
  if(span) span.textContent=`niveau: ${payload.value} dB(A)`;
}
connection.on("addNoiseMeasure",onNoiseMeasure);

/* ---- Start Diapason with fallback ---- */
async function startDiapason(){
  try{
    console.info("[Diapason] Start WS");
    await connection.start(); DIAPASON_CONNECTED=true; setDiaLED(true);
    return;
  }catch(e){
    console.warn("[Diapason] WS failed → fallback LP",e);
  }
  try{
    connection=buildConnection(signalR.HttpTransportType.LongPolling,false);
    connection.serverTimeoutInMilliseconds=30000;
    connection.keepAliveIntervalInMilliseconds=10000;

    connection.on("addNoiseMeasure",onNoiseMeasure);
    connection.onreconnecting(()=>setDiaLED("reconnecting"));
    connection.onreconnected(()=>setDiaLED(true));
    connection.onclose(()=>setDiaLED(false));

    console.info("[Diapason] Start LP");
    await connection.start(); DIAPASON_CONNECTED=true; setDiaLED(true);
  }catch(e2){
    console.error("[Diapason] LP failed",e2);
    DIAPASON_CONNECTED=false; setDiaLED(false);
  }
}

/* ---- Watchdog bruit ---- */
setInterval(()=>{
  if(!LAST_NOISE_TS) return;
  const delta=Date.now()-LAST_NOISE_TS;
  if(delta>45000 && DIAPASON_CONNECTED) setDiaLED("reconnecting");
  if(delta>120000) setDiaLED(false);
},10000);

/* ---- Bouton Reconnecter ---- */
(function(){
  const b=document.getElementById("dia-reconnect");
  if(!b) return;
  b.onclick=async()=>{
    setDiaLED(false);
    try{await connection.stop().catch(()=>{});}catch(e){}
    await startDiapason();
  };
})();

startDiapason();

/* ================================
   HISTORIQUE BRUIT
================================ */
function updateNoiseUI(list){
  const box=document.getElementById("noise-live");
  if(!list||!list.length){box.textContent="Aucune donnée.";return;}
  box.innerHTML=list.sort((a,b)=>a.id>b.id?1:-1)
    .map(v=>`<div><strong>${v.id}</strong> : ${v.laeq??"n/d"} dB(A)</div>`).join("");
}

function updateHistoryChart(fId){
  const canvas=document.getElementById(`chart_${fId}`); if(!canvas) return;
  const data=NOISE_HISTORY[fId], labels=data.map(
    p=>new Date(p.t).toLocaleTimeString("fr-BE",{minute:"2-digit",second:"2-digit"})),
    values=data.map(p=>p.v);

  if(!CHARTS[fId]){
    CHARTS[fId]=new Chart(canvas.getContext("2d"),{
      type:"line",
      data:{labels,datasets:[{
        label:"LAeq (dB)",data:values,borderColor:"#2563eb",
        backgroundColor:"rgba(37,99,235,0.2)",tension:.25,borderWidth:2,pointRadius:0
      }]},
      options:{animation:false,scales:{x:{display:true},y:{min:20,max:90}},
      plugins:{legend:{display:false}}}
    });
  }else{
    CHARTS[fId].data.labels=labels;
    CHARTS[fId].data.datasets[0].data=values;
    CHARTS[fId].update();
  }
}

/* ================================
   ALERTES METEO
================================ */
function computeAlerts(m,rw){
  const a=[];
  if(m&&m.wind_speed&&m.wind_speed.value>25) a.push("Vent fort (>25 kt)");
  if(m&&m.wind_gust&&m.wind_gust.value>35) a.push("Rafales (>35 kt)");
  if(rw&&m&&m.wind_direction){
    const diff=Math.abs(m.wind_direction.value-rw.heading);
    if(diff>150&&diff<210) a.push("Vent arrière");
  }
  if(lastRunway&&rw&&lastRunway!==rw.name)
    a.push(`Changement piste : ${lastRunway} → ${rw.name}`);
  lastRunway=rw?rw.name:null;

  const el=document.getElementById("alerts");
  if(el) el.innerHTML=a.length?a.map(x=>`<div>⚠️ ${x}</div>`).join(""):"Aucune alerte.";
}

/* ================================
   TAKEOFF DETECTION 04 & 22 + VR + F017
================================ */
const MS2KT=1.943844, M2FT=3.28084;
const ROLL_GS_KT=70, VR_GS_KT=110, CLIMB_MAX_ALT_FT=200, CENTERLINE_MAX_OFFSET_KM=0.5;

let IS_TAKEOFF_04=false,lastTakeoffTime04=0,
    IS_TAKEOFF_22=false,lastTakeoffTime22=0,
    VR_DETECTED=false,VR_LOCATION=null,VR_MARKER=null;

function angleDiff(a,b){let d=Math.abs(a-b)%360; return d>180?360-d:d;}

function detectTakeoff04(states){
  let detected=false;
  for(const s of states){
    const cs=(s[1]||"").trim(), lon=s[5], lat=s[6];
    if(lat==null||lon==null) continue;

    const vel=s[9]||0, track=(s[10]!=null)?s[10]:null,
          vrate=(s[11]!=null)?s[11]:null,
          alt_m=(s[13]!=null)?s[13]:((s[7]!=null)?s[7]:0);

    const gs=vel*MS2KT, alt_ft=(alt_m||0)*M2FT;
    const norm=normalizeCallsign(cs);

    let fids=null;
    if(LAST_FIDS&&LAST_FIDS.departures){
      fids=LAST_FIDS.departures.find(v=>normalizeCallsign(v.flightPax||v.flight||v.callsign)===norm
          && (v.runway||"").includes("04"));
    }
    if(!fids) continue;

    const onRunway=pointInPolygon([lat,lon],RWY04_POLY),
          good=(track!=null)?(angleDiff(track,40)<=HEAD_TOL):true,
          offset=distancePointToSegmentKm([lat,lon],RWY04_START,RWY04_END),
          near=offset<=CENTERLINE_MAX_OFFSET_KM;

    const roll=onRunway&&good&&gs>=ROLL_GS_KT,
          climb=!onRunway&&good&&gs>=ROLL_GS_KT&&(alt_ft>0&&alt_ft<=CLIMB_MAX_ALT_FT)&&near;

    if(!VR_DETECTED && onRunway && good && gs>=VR_GS_KT &&
       (alt_ft<50||(vrate!=null&&vrate>0.5))){
      VR_DETECTED=true; VR_LOCATION=[lat,lon];
      if(VR_MARKER) map.removeLayer(VR_MARKER);
      VR_MARKER=L.circleMarker(VR_LOCATION,{
        radius:8,color:"#22d3ee",fillColor:"#22d3ee",fillOpacity:.9
      }).addTo(map).bindPopup("Rotation Point (VR)");
    }

    if(roll||climb){
      detected=true;
      if(!IS_TAKEOFF_04) showTakeoffNotification04(cs||"—");
      IS_TAKEOFF_04=true; lastTakeoffTime04=Date.now();
      checkF017Overflight(lat,lon);
    }
  }

  if(!detected && IS_TAKEOFF_04 && (Date.now()-lastTakeoffTime04>20000)){
    IS_TAKEOFF_04=false;
    if(F017_SURVEY_ACTIVE&&F017_SURVEY_START){
      const d=((Date.now()-F017_SURVEY_START)/1e3).toFixed(1);
      showToast(`Survol F017 terminé – durée ${d} s`,"#0ea5e9");
    }
    F017_SURVEY_ACTIVE=false; F017_SURVEY_START=null;
  }
}

function detectTakeoff22(states){
  let detected=false;
  for(const s of states){
    const cs=(s[1]||"").trim(), lon=s[5], lat=s[6];
    if(lat==null||lon==null) continue;

    const vel=s[9]||0, track=(s[10]!=null)?s[10]:null,
          alt_m=(s[13]!=null)?s[13]:((s[7]!=null)?s[7]:0);

    const gs=vel*MS2KT, alt_ft=(alt_m||0)*M2FT;
    const norm=normalizeCallsign(cs);

    let fids=null;
    if(LAST_FIDS&&LAST_FIDS.departures){
      fids=LAST_FIDS.departures.find(v=>normalizeCallsign(v.flightPax||v.flight||v.callsign)===norm
          && (v.runway||"").includes("22"));
    }
    if(!fids) continue;

    const onRunway=pointInPolygon([lat,lon],RWY22_POLY),
          good=(track!=null)?(angleDiff(track,220)<=HEAD_TOL):true,
          offset=distancePointToSegmentKm([lat,lon],RWY22_START,RWY22_END),
          near=offset<=CENTERLINE_MAX_OFFSET_KM;

    const roll=onRunway&&good&&gs>=ROLL_GS_KT,
          climb=!onRunway&&good&&gs>=ROLL_GS_KT&&(alt_ft>0&&alt_ft<=CLIMB_MAX_ALT_FT)&&near;

    if(roll||climb){
      detected=true; IS_TAKEOFF_22=true; lastTakeoffTime22=Date.now();
    }
  }

  if(!detected && IS_TAKEOFF_22 && (Date.now()-lastTakeoffTime22>20000)){
    IS_TAKEOFF_22=false;
  }
}
</script>
<script>
/* ================================
   MAIN REFRESH LOOP
================================ */
async function refresh(){
  // --- METAR ---
  const metar = await fetchMetar().catch(()=>null);
  if(metar) updateMetarUI(metar);

  // --- FIDS ---
  const fids = await fetchFIDS().catch(()=>({arrivals:[],departures:[]}));
  updateFlightsUI(fids);

  // --- Détermination piste ---
  const rwF = extractRunway(fids);
  const rwM = metar ? runwayFromMetar(metar) : null;
  const rw = rwF || rwM;

  if(!rw){
    const el=document.getElementById("runway-info");
    if(el) el.textContent="Piste indéterminée.";
  }else{
    const el=document.getElementById("runway-info");
    if(el) el.textContent = `Piste ${rw.name} – cap ${rw.heading}°`;

    if(lastHeading==null) lastHeading = rw.heading;
    lastHeading += (rw.heading - lastHeading) * 0.1;

    // Couleurs sonos incluant la logique F017
    colorSonoByRunway(rw.name);

    // Couloir + heatmap
    const imp = computeImpacted(lastHeading);
    updateHeatmap(imp);

    const box=document.getElementById("sonos-impacted");
    if(box){
      box.innerHTML = imp.length
        ? imp.map(s=>`<span class="tag impacted">${s.id}</span>`).join(" ")
        : "Aucun impacté";
    }

    computeAlerts(metar||{},rw);
    lastRunway=rw.name;
  }

  // --- ADS-B ---
  const adsb = await fetchADSB().catch(()=>[]);
  updateADSB(adsb);

  // --- Icône F017 si décollage 04 ---
  updateF017Icon();
}

/* ================================
   UI TOGGLES + RESET MAP
================================ */
(function(){
  const btnHeat=document.getElementById("toggle-heatmap");
  if(btnHeat){
    btnHeat.onclick=()=>{
      HEATMAP_ENABLED=!HEATMAP_ENABLED;
      btnHeat.textContent=`Heatmap : ${HEATMAP_ENABLED?"ON":"OFF"}`;
      btnHeat.classList.toggle("off",!HEATMAP_ENABLED);
      if(!HEATMAP_ENABLED && heatLayer){
        map.removeLayer(heatLayer); heatLayer=null;
      }
    };
  }

  const btnCorr=document.getElementById("toggle-corridor");
  if(btnCorr){
    btnCorr.onclick=()=>{
      CORRIDOR_ENABLED=!CORRIDOR_ENABLED;
      btnCorr.textContent=`Corridor : ${CORRIDOR_ENABLED?"ON":"OFF"}`;
      btnCorr.classList.toggle("off",!CORRIDOR_ENABLED);
      if(!CORRIDOR_ENABLED && corridorLayer){
        map.removeLayer(corridorLayer); corridorLayer=null;
      }
    };
  }

  const btnTracks=document.getElementById("toggle-tracks");
  if(btnTracks){
    btnTracks.onclick=()=>{
      TRACKS_ENABLED=!TRACKS_ENABLED;
      btnTracks.textContent=`Trajectoires ADS‑B : ${TRACKS_ENABLED?"ON":"OFF"}`;
      btnTracks.classList.toggle("off",!TRACKS_ENABLED);
      if(!TRACKS_ENABLED) hideAllTracks();
    };
  }

  const btnSonos=document.getElementById("toggle-sonos");
  if(btnSonos){
    btnSonos.onclick=()=>{
      SONOS_ENABLED=!SONOS_ENABLED;
      btnSonos.textContent=`Sonomètres : ${SONOS_ENABLED?"ON":"OFF"}`;
      btnSonos.classList.toggle("off",!SONOS_ENABLED);
      updateSonometersVisibility();
    };
  }

  // RESET CARTE
  function resetMap(){
    map.setView([EBLG.lat,EBLG.lon],11);
    map.closePopup();

    if(window.flightMarker){
      map.removeLayer(window.flightMarker);
      window.flightMarker=null;
    }

    if(!HEATMAP_ENABLED && heatLayer){
      map.removeLayer(heatLayer);
      heatLayer=null;
    }

    if(!CORRIDOR_ENABLED && corridorLayer){
      map.removeLayer(corridorLayer);
      corridorLayer=null;
    }

    if(!TRACKS_ENABLED) hideAllTracks();
    updateSonometersVisibility();
  }

  const btnReset=document.getElementById("reset-map");
  if(btnReset){
    btnReset.onclick=()=>{ resetMap(); };
  }
})();

/* ================================
   AUTO-REFRESH
================================ */
refresh();
setInterval(refresh,60000);
</script>
