<script>
/* ============================================================================
   1) CONFIGURATION GLOBALE
============================================================================ */

const AVWX_TOKEN = "";          // à compléter
const AVWX_ICAO  = "EBLG";
const FIDS_PROXY = "";          // à compléter (proxy JSON)
const FIDS_URL_ARR = "";        // à compléter
const FIDS_URL_DEP = "";        // à compléter
const ADSB_URL = "";            // à compléter (backend ADS-B)
const HUB_URL = "";             // Diapason SignalR

const EBLG = {
  lat: 50.6374,
  lon: 5.4432,
  runways: [
    { name: "04", heading: 40 },
    { name: "22", heading: 220 }
  ]
};

let FLT_FILTER = "ALL";
const HEAD_TOL = 15;

let lastHeading = null;
let lastRunway  = null;
let LAST_FIDS   = null;

/* ============================================================================
   2) SONOMETRES (LISTE MINIMALE + COULEURS)
============================================================================ */

const SONOS = [
  // Exemple minimal – à adapter à ta liste réelle
  { id: "F017", name: "F017", lat: 50.65, lon: 5.45 },
  { id: "F018", name: "F018", lat: 50.64, lon: 5.44 },
  { id: "F019", name: "F019", lat: 50.63, lon: 5.46 }
];

const COLOR = {
  green: "#10b981",
  red:   "#ef4444",
  gray:  "#6b7280"
};

const SONO_RULES = {
  // Exemple simple : seuils génériques
  default: { warn: 65, danger: 75 }
};

/* ============================================================================
   3) MAP INITIALISATION
============================================================================ */

const map = L.map("map").setView([EBLG.lat, EBLG.lon], 11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "&copy; OpenStreetMap"
}).addTo(map);

const SONO_MARKERS = {};
SONOS.forEach(s => {
  const m = L.circleMarker([s.lat, s.lon], {
    radius: 6,
    color: "#4b5563",
    fillColor: "#9ca3af",
    fillOpacity: 0.9
  }).addTo(map);
  m.bindPopup(`${s.name}`);
  SONO_MARKERS[s.id] = m;
});

/* ============================================================================
   4) OUTILS GEOMETRIQUES
============================================================================ */

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function computePoint([lat, lon], headingDeg, distanceKm) {
  const R = 6371;
  const brng = toRad(headingDeg);
  const dR = distanceKm / R;
  const lat1 = toRad(lat);
  const lon1 = toRad(lon);

  const lat2 = Math.asin(Math.sin(lat1) * Math.cos(dR) +
                         Math.cos(lat1) * Math.sin(dR) * Math.cos(brng));
  const lon2 = lon1 + Math.atan2(
    Math.sin(brng) * Math.sin(dR) * Math.cos(lat1),
    Math.cos(dR) - Math.sin(lat1) * Math.sin(lat2)
  );

  return [toDeg(lat2), toDeg(lon2)];
}

function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function distancePointToSegmentKm(p, A, B) {
  const [px, py] = p;
  const [ax, ay] = A;
  const [bx, by] = B;

  const abx = bx - ax;
  const aby = by - ay;
  const apx = px - ax;
  const apy = py - ay;

  const ab2 = abx*abx + aby*aby;
  if (ab2 === 0) return distanceKm(px, py, ax, ay);

  let t = (apx*abx + apy*aby) / ab2;
  t = Math.max(0, Math.min(1, t));

  const cx = ax + t * abx;
  const cy = ay + t * aby;
  return distanceKm(px, py, cx, cy);
}

function pointInPolygon([x, y], poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i][1], yi = poly[i][0];
    const xj = poly[j][1], yj = poly[j][0];
    const intersect = ((yi > y) !== (yj > y)) &&
                      (x < (xj - xi) * (y - yi) / (yj - yi + 1e-12) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

/* ============================================================================
   5) RUNWAYS + POLYGONES ÉTENDUS
============================================================================ */

const RWY04_START = [50.63795, 5.4438];
const RWY04_END   = [50.6436,  5.452];
const RWY04_HEADING = 40;

const RWY22_START = RWY04_END;
const RWY22_END   = RWY04_START;
const RWY22_HEADING = 220;

const RWY04_POLY = [
  computePoint(RWY04_START, RWY04_HEADING - 90, 0.03),
  computePoint(RWY04_END,   RWY04_HEADING - 90, 0.03),
  computePoint(RWY04_END,   RWY04_HEADING + 90, 0.03),
  computePoint(RWY04_START, RWY04_HEADING + 90, 0.03)
];

const RWY22_POLY = [
  computePoint(RWY22_START, RWY22_HEADING - 90, 0.03),
  computePoint(RWY22_END,   RWY22_HEADING - 90, 0.03),
  computePoint(RWY22_END,   RWY22_HEADING + 90, 0.03),
  computePoint(RWY22_START, RWY22_HEADING + 90, 0.03)
];

const RWY04_EXT_POLY = [
  computePoint(RWY04_START, RWY04_HEADING - 90, 1.5),
  computePoint(RWY04_END,   RWY04_HEADING - 90, 3.5),
  computePoint(RWY04_END,   RWY04_HEADING + 90, 3.5),
  computePoint(RWY04_START, RWY04_HEADING + 90, 1.5)
];

const RWY22_EXT_POLY = [
  computePoint(RWY22_START, RWY22_HEADING - 90, 1.5),
  computePoint(RWY22_END,   RWY22_HEADING - 90, 3.5),
  computePoint(RWY22_END,   RWY22_HEADING + 90, 3.5),
  computePoint(RWY22_START, RWY22_HEADING + 90, 1.5)
];

/* ============================================================================
   6) CORRIDOR BRUIT
============================================================================ */

function buildCorridor(heading) {
  const origin = [EBLG.lat, EBLG.lon];
  const p1 = computePoint(origin, heading - 90, 1.5);
  const p2 = computePoint(origin, heading + 90, 1.5);
  const p3 = computePoint(origin, heading + 90, 20);
  const p4 = computePoint(origin, heading - 90, 20);
  return [p1, p2, p3, p4];
}

/* ============================================================================
   7) TOGGLES (ÉTATS INTERNES)
============================================================================ */

let HEATMAP_ENABLED = true;
let CORRIDOR_ENABLED = true;
let TRACKS_ENABLED = true;
let SONOS_ENABLED = true;

let heatLayer = null;
let corridorLayer = null;

/* ============================================================================
   8) ICONE AVION (SVG SIMPLE)
============================================================================ */

const PLANE_ICON_SVG = `
<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
  <path d="M2.5 19l8.5-7-8.5-7v4.5l5 2.5-5 2.5V19zm9.5 0l8.5-7-8.5-7v4.5l5 2.5-5 2.5V19z"/>
</svg>`;

/* ============================================================================
   9) ADS-B FETCH
============================================================================ */

async function fetchADSB() {
  if (!ADSB_URL) return [];
  try {
    const r = await fetch(ADSB_URL);
    if (!r.ok) throw new Error("ADS-B HTTP " + r.status);
    const data = await r.json();
    return data.states || [];
  } catch (e) {
    console.warn("ADS-B error:", e);
    return [];
  }
}

/* ============================================================================
   10) ADS-B MARKERS & TRAJECTOIRES
============================================================================ */

let ADSB_MARKERS = {};
let ADSB_BY_CALLSIGN = {};
let TRACK_HISTORY = {};
let TRACK_LAYERS = {};
let TRACK_DECORATORS = {};
let SELECTED_PLANE = null;

function normalizeCallsign(t) {
  if (!t) return null;
  return String(t).trim().toUpperCase();
}

function planeIconFor(track, color) {
  return L.divIcon({
    className: "plane-icon",
    html: `<div style="transform:rotate(${track.heading || 0}deg);color:${color};">${PLANE_ICON_SVG}</div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12]
  });
}

function updateTracks(states) {
  if (!TRACKS_ENABLED) {
    Object.values(TRACK_LAYERS).forEach(l => map.removeLayer(l));
    Object.values(TRACK_DECORATORS).forEach(d => map.removeLayer(d));
    TRACK_LAYERS = {};
    TRACK_DECORATORS = {};
    TRACK_HISTORY = {};
    return;
  }

  states.forEach(s => {
    const cs = normalizeCallsign(s.callsign || s.icao || s.hex);
    if (!cs || !s.lat || !s.lon) return;

    if (!TRACK_HISTORY[cs]) TRACK_HISTORY[cs] = [];
    TRACK_HISTORY[cs].push([s.lat, s.lon]);
    if (TRACK_HISTORY[cs].length > 60) TRACK_HISTORY[cs].shift();

    if (TRACK_LAYERS[cs]) {
      map.removeLayer(TRACK_LAYERS[cs]);
      if (TRACK_DECORATORS[cs]) map.removeLayer(TRACK_DECORATORS[cs]);
    }

    const poly = L.polyline(TRACK_HISTORY[cs], { color: "#2563eb", weight: 2, opacity: 0.7 }).addTo(map);
    TRACK_LAYERS[cs] = poly;

    const decorator = L.polylineDecorator(poly, {
      patterns: [{
        offset: "100%",
        repeat: 0,
        symbol: L.Symbol.arrowHead({
          pixelSize: 10,
          polygon: false,
          pathOptions: { color: "#1d4ed8", weight: 2 }
        })
      }]
    }).addTo(map);
    TRACK_DECORATORS[cs] = decorator;
  });
}

function updateADSB(states) {
  const seen = new Set();

  states.forEach(s => {
    const cs = normalizeCallsign(s.callsign || s.icao || s.hex);
    if (!cs || !s.lat || !s.lon) return;
    seen.add(cs);

    const pos = [s.lat, s.lon];
    const heading = s.heading || s.track || 0;
    const color = "#f97316";

    if (!ADSB_MARKERS[cs]) {
      const marker = L.marker(pos, { icon: planeIconFor({ heading }, color) }).addTo(map);
      marker.on("click", () => {
        SELECTED_PLANE = cs;
        showPlaneInfo(cs);
      });
      ADSB_MARKERS[cs] = marker;
    } else {
      ADSB_MARKERS[cs].setLatLng(pos);
      ADSB_MARKERS[cs].setIcon(planeIconFor({ heading }, color));
    }

    ADSB_BY_CALLSIGN[cs] = {
      callsign: cs,
      icao: s.icao || s.hex,
      lat: s.lat,
      lon: s.lon,
      altitude: s.altitude || s.baro_altitude,
      speed: s.speed || s.ground_speed,
      verticalRate: s.vertical_rate,
      heading,
      onGround: !!s.on_ground,
      lastSeen: s.time || Date.now()
    };
  });

  Object.keys(ADSB_MARKERS).forEach(cs => {
    if (!seen.has(cs)) {
      map.removeLayer(ADSB_MARKERS[cs]);
      delete ADSB_MARKERS[cs];
      delete ADSB_BY_CALLSIGN[cs];
      delete TRACK_HISTORY[cs];
      if (TRACK_LAYERS[cs]) {
        map.removeLayer(TRACK_LAYERS[cs]);
        delete TRACK_LAYERS[cs];
      }
      if (TRACK_DECORATORS[cs]) {
        map.removeLayer(TRACK_DECORATORS[cs]);
        delete TRACK_DECORATORS[cs];
      }
      if (SELECTED_PLANE === cs) {
        SELECTED_PLANE = null;
        hidePlaneInfo();
      }
    }
  });

  updateTracks(states);
}

/* ============================================================================
   11) Panneau avion sélectionné
============================================================================ */

function showPlaneInfo(cs) {
  const info = ADSB_BY_CALLSIGN[cs];
  const box = document.getElementById("plane-info");
  if (!info) {
    box.style.display = "none";
    return;
  }

  const hue = (info.heading || 0) % 360;
  const color = `hsl(${hue}, 80%, 55%)`;
  box.style.borderLeftColor = color;
  box.style.display = "block";

  box.innerHTML = `
    <div class="title" style="font-weight:600;margin-bottom:0.25rem;">
      <span style="color:${color};vertical-align:middle;margin-right:0.25rem;">${PLANE_ICON_SVG}</span>
      ${info.callsign || info.icao}
    </div>
    Latitude : ${info.lat?.toFixed(4)}<br>
    Longitude : ${info.lon?.toFixed(4)}<br>
    Altitude : ${info.altitude ? info.altitude + " ft" : "N/A"}<br>
    Vitesse sol : ${info.speed ? info.speed + " kt" : "N/A"}<br>
    Taux montée/descente : ${info.verticalRate ? info.verticalRate + " ft/min" : "N/A"}<br>
    Cap : ${info.heading ? info.heading + "°" : "N/A"}<br>
    Sol : ${info.onGround ? "Oui" : "Non"}<br>
    Dernière mise à jour : ${new Date(info.lastSeen).toLocaleTimeString()}<br>
  `;
}

function hidePlaneInfo() {
  const box = document.getElementById("plane-info");
  box.style.display = "none";
}

/* ============================================================================
   12) METAR
============================================================================ */

async function fetchMetar() {
  if (!AVWX_TOKEN) return null;
  try {
    const r = await fetch(`https://avwx.rest/api/metar/${AVWX_ICAO}?token=${AVWX_TOKEN}`);
    if (!r.ok) throw new Error("METAR HTTP " + r.status);
    return await r.json();
  } catch (e) {
    console.warn("METAR error:", e);
    return null;
  }
}

function formatLocal(t) {
  if (!t) return "";
  const d = new Date(t);
  return d.toLocaleString();
}

function updateMetarUI(m) {
  const summary = document.getElementById("meteo-summary");
  const raw = document.getElementById("meteo-raw");
  if (!m) {
    summary.textContent = "METAR indisponible";
    raw.textContent = "";
    return;
  }
  summary.innerHTML = `
    ${m.station || AVWX_ICAO} – ${formatLocal(m.time?.dt)}<br>
    Vent : ${m.wind_direction?.repr || "///"}° ${m.wind_speed?.repr || "0"} kt<br>
    Temp : ${m.temperature?.repr || "N/A"}°C – QNH ${m.altimeter?.value || "N/A"} hPa
  `;
  raw.textContent = m.raw || "";
}

/* ============================================================================
   13) FIDS
============================================================================ */

async function fetchFIDS() {
  if (!FIDS_PROXY || (!FIDS_URL_ARR && !FIDS_URL_DEP)) {
    return { arrivals: [], departures: [] };
  }
  try {
    const r = await fetch(FIDS_PROXY, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ arr: FIDS_URL_ARR, dep: FIDS_URL_DEP })
    });
    if (!r.ok) throw new Error("FIDS HTTP " + r.status);
    const data = await r.json();
    LAST_FIDS = data;
    return data;
  } catch (e) {
    console.warn("FIDS error:", e);
    return { arrivals: [], departures: [] };
  }
}

function updateFlightsUI(fids) {
  const box = document.getElementById("flights-list");
  const arr = fids.arrivals || [];
  const dep = fids.departures || [];

  const list = FLT_FILTER === "ARR" ? arr :
               FLT_FILTER === "DEP" ? dep :
               [...arr, ...dep];

  if (!list.length) {
    box.textContent = "Aucun vol.";
    return;
  }

  let html = `<table><thead><tr>
    <th>Type</th><th>Vol</th><th>Orig/Dest</th><th>Heure</th><th>Statut</th>
  </tr></thead><tbody>`;

  list.forEach(v => {
    const type = v.type || (v.arrival ? "ARR" : "DEP");
    const code = v.flight || v.callsign || "";
    const od = v.origin || v.destination || "";
    const time = v.time || v.sched || "";
    const status = v.status || "";
    html += `<tr onclick="showFlightDetail('${(v.id || code).replace(/'/g,"")}')">
      <td><span class="badge">${type}</span></td>
      <td>${code}</td>
      <td>${od}</td>
      <td>${time}</td>
      <td>${status}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  box.innerHTML = html;
}

function showFlightDetail(id) {
  const box = document.getElementById("flight-detail");
  if (!LAST_FIDS) {
    box.textContent = "Aucune donnée FIDS.";
    return;
  }
  const all = [...(LAST_FIDS.arrivals || []), ...(LAST_FIDS.departures || [])];
  const v = all.find(x => (x.id || x.flight || x.callsign) === id);
  if (!v) {
    box.textContent = "Vol introuvable.";
    return;
  }
  box.innerHTML = `
    Vol : ${v.flight || v.callsign || ""}<br>
    Type : ${v.type || (v.arrival ? "ARR" : "DEP")}<br>
    Origine : ${v.origin || ""}<br>
    Destination : ${v.destination || ""}<br>
    Heure prévue : ${v.sched || v.time || ""}<br>
    Statut : ${v.status || ""}<br>
  `;
}

/* ============================================================================
   14) LOGIQUE PISTE (FIDS + METAR)
============================================================================ */

function extractRunway(fids) {
  const arr = fids.arrivals || [];
  const dep = fids.departures || [];
  const list = FLT_FILTER === "ARR" ? arr :
               FLT_FILTER === "DEP" ? dep :
               [...arr, ...dep];

  const now = Date.now();
  let best = null;
  list.forEach(v => {
    const rw = v.runway || v.rwy || "";
    if (!rw) return;
    const name = rw.replace(/[^0-9]/g, "");
    const r = EBLG.runways.find(x => x.name === name);
    if (!r) return;
    const t = v.time_ts || v.sched_ts || now;
    if (!best || Math.abs(t - now) < Math.abs(best.time - now)) {
      best = { name: r.name, heading: r.heading, time: t };
    }
  });
  return best;
}

function runwayFromMetar(m) {
  if (!m || !m.wind_direction || !m.wind_direction.value) return null;
  const dir = m.wind_direction.value;
  let best = null;
  EBLG.runways.forEach(r => {
    const diff = Math.abs(((r.heading - dir + 540) % 360) - 180);
    if (diff <= HEAD_TOL && (!best || diff < best.diff)) {
      best = { name: r.name, heading: r.heading, diff };
    }
  });
  return best;
}

/* ============================================================================
   15) SONOMETRES COLORATION
============================================================================ */

function updateSonoColors(runwayName, phase) {
  const impactedIds = [];
  SONOS.forEach(s => {
    const m = SONO_MARKERS[s.id];
    if (!m) return;
    let color = COLOR.gray;
    if (runwayName === "04") color = COLOR.green;
    if (runwayName === "22") color = COLOR.red;
    m.setStyle({ color, fillColor: color });
    impactedIds.push(s.id);
  });

  const box = document.getElementById("sonos-impacted");
  if (!impactedIds.length) {
    box.textContent = "Aucun sonomètre impacté.";
  } else {
    box.textContent = impactedIds.join(", ");
  }
}

/* ============================================================================
   16) HEATMAP
============================================================================ */

function computeImpacted(heading) {
  const poly = heading === RWY04_HEADING ? RWY04_EXT_POLY :
               heading === RWY22_HEADING ? RWY22_EXT_POLY :
               buildCorridor(heading);

  const impacted = [];
  SONOS.forEach(s => {
    if (pointInPolygon([s.lat, s.lon], poly)) {
      impacted.push([s.lat, s.lon, 1]);
    }
  });
  return impacted;
}

function updateHeatmap(list) {
  if (heatLayer) {
    map.removeLayer(heatLayer);
    heatLayer = null;
  }
  if (!HEATMAP_ENABLED || !list.length) return;
  heatLayer = L.heatLayer(list, { radius: 25, blur: 15, maxZoom: 15 }).addTo(map);
}

/* ============================================================================
   17) CORRIDOR UPDATE
============================================================================ */

function updateCorridor() {
  if (corridorLayer) {
    map.removeLayer(corridorLayer);
    corridorLayer = null;
  }
  if (!CORRIDOR_ENABLED || !lastHeading) return;
  const poly = buildCorridor(lastHeading);
  corridorLayer = L.polygon(poly, {
    color: "#f97316",
    weight: 1,
    fillOpacity: 0.08
  }).addTo(map);
}

/* ============================================================================
   19) ALERTES METEO
============================================================================ */

function computeAlerts(metar, rw) {
  const box = document.getElementById("alerts");
  const alerts = [];

  if (!metar) {
    box.innerHTML = `<div class="alert warn">METAR indisponible.</div>`;
    return;
  }

  const wind = metar.wind_speed?.value || 0;
  const gust = metar.wind_gust?.value || 0;
  const vis  = metar.visibility?.value || 9999;

  if (wind >= 20) alerts.push({ level: "warn", msg: `Vent soutenu ${wind} kt.` });
  if (gust >= 30) alerts.push({ level: "danger", msg: `Rafales ${gust} kt.` });
  if (vis < 3000) alerts.push({ level: "warn", msg: `Visibilité réduite ${vis} m.` });

  if (rw && metar.wind_direction?.value) {
    const dir = metar.wind_direction.value;
    const diff = Math.abs(((rw.heading - dir + 540) % 360) - 180);
    if (diff > 60) {
      alerts.push({ level: "warn", msg: `Vent de travers marqué sur piste ${rw.name}.` });
    }
  }

  if (!alerts.length) {
    box.innerHTML = `<div class="alert">Aucune alerte particulière.</div>`;
    return;
  }

  box.innerHTML = alerts.map(a =>
    `<div class="alert ${a.level}">${a.msg}</div>`
  ).join("");
}

============================================================================ */

async function refresh() {
  const metar = await fetchMetar().catch(() => null);
  if (metar) updateMetarUI(metar);

  const fids = await fetchFIDS().catch(() => ({ arrivals: [], departures: [] }));
  updateFlightsUI(fids);

  const rwF = extractRunway(fids);
  const rwM = runwayFromMetar(metar);
  const rw  = rwF || rwM;

  if (rw) {
    lastHeading = rw.heading;
    lastRunway  = rw.name;
    document.getElementById("runway-info").textContent =
      `Piste active : ${rw.name} (cap ${rw.heading}°)`;
  } else {
    document.getElementById("runway-info").textContent = "Piste active : inconnue";
  }

  const phase = FLT_FILTER === "ARR" ? "ARR" : "DEP";
  if (rw) updateSonoColors(rw.name, phase);

  const impacted = rw ? computeImpacted(rw.heading) : [];
  updateHeatmap(impacted);

  if (rw) updateCorridor();

  computeAlerts(metar, rw);

  const adsb = await fetchADSB().catch(() => []);
  updateADSB(adsb);

  detectTakeoff04(adsb);
  detectTakeoff22(adsb);
}
