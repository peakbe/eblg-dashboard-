  <section id="map"></section>

<script>

/* ============================================================================
   1) CONFIGURATION GLOBALE — VERSION FINALE AVEC TES DONNÉES
============================================================================ */

const AVWX_TOKEN = "ersegQzkf2Dfal-o26B4b5uzMrXBeHK2jOpOaY7nffc";
const AVWX_ICAO  = "EBLG";

/* --- FIDS (via ton proxy Render) --- */
const FIDS_PROXY = "https://eblg-proxy.onrender.com/fids?url=";

const FIDS_URL_ARR = FIDS_PROXY + encodeURIComponent(
  "https://fids.liegeairport.com/api/flights/Arrivals"
);

const FIDS_URL_DEP = FIDS_PROXY + encodeURIComponent(
  "https://fids.liegeairport.com/api/flights/Departures"
);

/* --- ADS-B (OpenSky Network) --- */
const ADSB_URL = "https://opensky-network.org/api/states/all";

/* --- Diapason (SignalR bruit temps réel) --- */
const HUB_URL = "https://eblg.aerovision.cloud/EBLG/signalr-noise";

/* --- Données EBLG --- */
const EBLG = {
  lat: 50.6374,
  lon: 5.4432,
  runways: [
    { name: "04", heading: 40 },
    { name: "22", heading: 220 }
  ]
};

let FLT_FILTER = "ALL";
let lastHeading = null;
let lastRunway  = null;
let LAST_FIDS   = null;


/* ============================================================================
  2) SONOMETRES — Coordonnées réelles EBLG
============================================================================ */

const SONOS = [
  { id: "F017", lat: 50.764883, lon: 5.630606 },
  { id: "F001", lat: 50.738044, lon: 5.608833 },
  { id: "F014", lat: 50.718894, lon: 5.573164 },
  { id: "F015", lat: 50.688839, lon: 5.526217 },
  { id: "F005", lat: 50.639331, lon: 5.323519 },
  { id: "F003", lat: 50.601167, lon: 5.381400 },
  { id: "F011", lat: 50.601142, lon: 5.355006 },
  { id: "F008", lat: 50.594878, lon: 5.358950 },
  { id: "F002", lat: 50.588414, lon: 5.370522 },
  { id: "F007", lat: 50.590756, lon: 5.344114 },
  { id: "F009", lat: 50.580831, lon: 5.355417 },
  { id: "F004", lat: 50.605414, lon: 5.321406 },
  { id: "F010", lat: 50.599392, lon: 5.313492 },
  { id: "F013", lat: 50.586914, lon: 5.308678 },
  { id: "F016", lat: 50.619617, lon: 5.295344 },
  { id: "F006", lat: 50.609594, lon: 5.271403 },
  { id: "F012", lat: 50.621917, lon: 5.254747 }
];


const COLOR = {
  green: "#10b981",
  red:   "#ef4444",
  gray:  "#6b7280"
};

/* ============================================================================
   3) INITIALISATION DE LA CARTE
============================================================================ */
const map = L.map("map").setView([EBLG.lat, EBLG.lon], 11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "&copy; OpenStreetMap"
}).addTo(map);

const SONO_MARKERS = {};
SONOS.forEach(s => {
  const m = L.circleMarker([s.lat, s.lon], {
    radius: 6,
    color: "#4b5563",
    fillColor: "#9ca3af",
    fillOpacity: 0.9
  }).addTo(map);
  m.bindPopup(s.id);
  SONO_MARKERS[s.id] = m;
});

/* ============================================================================
   4) OUTILS GEOMETRIQUES
============================================================================ */
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function computePoint([lat, lon], headingDeg, distanceKm) {
  const R = 6371;
  const brng = toRad(headingDeg);
  const dR = distanceKm / R;
  const lat1 = toRad(lat);
  const lon1 = toRad(lon);

  const lat2 = Math.asin(
    Math.sin(lat1) * Math.cos(dR) +
    Math.cos(lat1) * Math.sin(dR) * Math.cos(brng)
  );

  const lon2 = lon1 + Math.atan2(
    Math.sin(brng) * Math.sin(dR) * Math.cos(lat1),
    Math.cos(dR) - Math.sin(lat1) * Math.sin(lat2)
  );

  return [toDeg(lat2), toDeg(lon2)];
}

function pointInPolygon([x, y], poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i][1], yi = poly[i][0];
    const xj = poly[j][1], yj = poly[j][0];
    const intersect = ((yi > y) !== (yj > y)) &&
                      (x < (xj - xi) * (y - yi) / (yj - yi + 1e-12) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

/* ============================================================================
   5) RUNWAYS + POLYGONES ÉTENDUS
============================================================================ */
const RWY04_START = [50.63795, 5.4438];
const RWY04_END   = [50.6436,  5.452];
const RWY04_HEADING = 40;

const RWY22_START = RWY04_END;
const RWY22_END   = RWY04_START;
const RWY22_HEADING = 220;

const RWY04_EXT_POLY = [
  computePoint(RWY04_START, RWY04_HEADING - 90, 1.5),
  computePoint(RWY04_END,   RWY04_HEADING - 90, 3.5),
  computePoint(RWY04_END,   RWY04_HEADING + 90, 3.5),
  computePoint(RWY04_START, RWY04_HEADING + 90, 1.5)
];

const RWY22_EXT_POLY = [
  computePoint(RWY22_START, RWY22_HEADING - 90, 1.5),
  computePoint(RWY22_END,   RWY22_HEADING - 90, 3.5),
  computePoint(RWY22_END,   RWY22_HEADING + 90, 3.5),
  computePoint(RWY22_START, RWY22_HEADING + 90, 1.5)
];

/* ============================================================================
   6) CORRIDOR BRUIT
============================================================================ */
function buildCorridor(heading) {
  const origin = [EBLG.lat, EBLG.lon];
  return [
    computePoint(origin, heading - 90, 1.5),
    computePoint(origin, heading + 90, 1.5),
    computePoint(origin, heading + 90, 20),
    computePoint(origin, heading - 90, 20)
  ];
}

/* ============================================================================
   7) TOGGLES (ÉTATS INTERNES)
============================================================================ */
let HEATMAP_ENABLED = true;
let CORRIDOR_ENABLED = true;
let TRACKS_ENABLED = true;
let SONOS_ENABLED = true;

let heatLayer = null;
let corridorLayer = null;
/* ============================================================================
   8) STRUCTURES INTERNES ADS‑B
============================================================================ */

let ADSB_MARKERS = {};        // Marqueurs Leaflet par callsign
let ADSB_BY_CALLSIGN = {};    // Dernière info avion par callsign
let TRACK_HISTORY = {};       // Historique des positions pour les trajectoires
let TRACK_LAYERS = {};        // Polylignes des trajectoires
let TRACK_DECORATORS = {};    // Flèches directionnelles
let SELECTED_PLANE = null;    // Callsign de l’avion sélectionné

/* ============================================================================
   9) NORMALISATION DES CALLSIGNS
============================================================================ */

function normalizeCallsign(t) {
  if (!t) return null;
  return String(t).trim().toUpperCase();
}

/* ============================================================================
   10) ICÔNE AVION (SVG ROTATIF)
============================================================================ */

const PLANE_ICON_SVG = `
<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
  <path d="M2.5 19l8.5-7-8.5-7v4.5l5 2.5-5 2.5V19zm9.5 0l8.5-7-8.5-7v4.5l5 2.5-5 2.5V19z"/>
</svg>`;

/**
 * Génère une icône Leaflet orientée selon le cap de l’avion.
 */
function planeIconFor(track, color) {
  return L.divIcon({
    className: "plane-icon",
    html: `
      <div style="transform:rotate(${track.heading || 0}deg); color:${color};">
        ${PLANE_ICON_SVG}
      </div>
    `,
    iconSize: [24, 24],
    iconAnchor: [12, 12]
  });
}
/* ============================================================================
   11) FETCH ADS‑B
============================================================================ */

async function fetchADSB() {
  if (!ADSB_URL) return [];

  try {
    const r = await fetch(ADSB_URL);
    if (!r.ok) throw new Error("ADS-B HTTP " + r.status);

    const data = await r.json();
    return data.states || [];
  } catch (e) {
    console.warn("Erreur ADS-B :", e);
    return [];
  }
}

/* ============================================================================
   12) MISE À JOUR DES MARQUEURS ADS‑B
============================================================================ */

function updateADSB(states) {
  const seen = new Set();

  states.forEach(s => {
    const cs = normalizeCallsign(s.callsign || s.icao || s.hex);
    if (!cs || !s.lat || !s.lon) return;

    seen.add(cs);

    const pos = [s.lat, s.lon];
    const heading = s.heading || s.track || 0;
    const color = "#f97316";

    // Création du marqueur si nécessaire
    if (!ADSB_MARKERS[cs]) {
      const marker = L.marker(pos, { icon: planeIconFor({ heading }, color) }).addTo(map);

      marker.on("click", () => {
        SELECTED_PLANE = cs;
        showPlaneInfo(cs);
      });

      ADSB_MARKERS[cs] = marker;
    } else {
      ADSB_MARKERS[cs].setLatLng(pos);
      ADSB_MARKERS[cs].setIcon(planeIconFor({ heading }, color));
    }

    // Mise à jour des infos avion
    ADSB_BY_CALLSIGN[cs] = {
      callsign: cs,
      icao: s.icao || s.hex,
      lat: s.lat,
      lon: s.lon,
      altitude: s.altitude || s.baro_altitude,
      speed: s.speed || s.ground_speed,
      verticalRate: s.vertical_rate,
      heading,
      onGround: !!s.on_ground,
      lastSeen: s.time || Date.now()
    };
  });

  /* -------------------------------------------------------------------------
     Suppression des avions disparus
  ------------------------------------------------------------------------- */
  Object.keys(ADSB_MARKERS).forEach(cs => {
    if (!seen.has(cs)) {
      map.removeLayer(ADSB_MARKERS[cs]);
      delete ADSB_MARKERS[cs];
      delete ADSB_BY_CALLSIGN[cs];

      if (TRACK_HISTORY[cs]) delete TRACK_HISTORY[cs];
      if (TRACK_LAYERS[cs]) {
        map.removeLayer(TRACK_LAYERS[cs]);
        delete TRACK_LAYERS[cs];
      }
      if (TRACK_DECORATORS[cs]) {
        map.removeLayer(TRACK_DECORATORS[cs]);
        delete TRACK_DECORATORS[cs];
      }

      if (SELECTED_PLANE === cs) {
        SELECTED_PLANE = null;
        hidePlaneInfo();
      }
    }
  });

  // Mise à jour des trajectoires (Bloc 3C)
  updateTracks(states);
}
/* ============================================================================
   13) TRAJECTOIRES ADS‑B (HISTORIQUE + POLYLINES + FLÈCHES)
============================================================================ */

function updateTracks(states) {
  // Si les trajectoires sont désactivées, on nettoie tout
  if (!TRACKS_ENABLED) {
    Object.values(TRACK_LAYERS).forEach(l => map.removeLayer(l));
    Object.values(TRACK_DECORATORS).forEach(d => map.removeLayer(d));
    TRACK_LAYERS = {};
    TRACK_DECORATORS = {};
    TRACK_HISTORY = {};
    return;
  }

  states.forEach(s => {
    const cs = normalizeCallsign(s.callsign || s.icao || s.hex);
    if (!cs || !s.lat || !s.lon) return;

    // Historique des positions
    if (!TRACK_HISTORY[cs]) TRACK_HISTORY[cs] = [];
    TRACK_HISTORY[cs].push([s.lat, s.lon]);

    // Limite de l’historique (60 points ≈ 5 minutes)
    if (TRACK_HISTORY[cs].length > 60) TRACK_HISTORY[cs].shift();

    // Suppression de l’ancienne trajectoire
    if (TRACK_LAYERS[cs]) {
      map.removeLayer(TRACK_LAYERS[cs]);
      delete TRACK_LAYERS[cs];
    }
    if (TRACK_DECORATORS[cs]) {
      map.removeLayer(TRACK_DECORATORS[cs]);
      delete TRACK_DECORATORS[cs];
    }

    // Nouvelle polyline
    const poly = L.polyline(TRACK_HISTORY[cs], {
      color: "#2563eb",
      weight: 2,
      opacity: 0.7
    }).addTo(map);

    TRACK_LAYERS[cs] = poly;

    // Flèche directionnelle (PolylineDecorator)
    const decorator = L.polylineDecorator(poly, {
      patterns: [
        {
          offset: "100%",
          repeat: 0,
          symbol: L.Symbol.arrowHead({
            pixelSize: 10,
            polygon: false,
            pathOptions: { color: "#1d4ed8", weight: 2 }
          })
        }
      ]
    }).addTo(map);

    TRACK_DECORATORS[cs] = decorator;
  });
}
/* ============================================================================
   14) PANNEAU D’INFORMATION – AVION SÉLECTIONNÉ
============================================================================ */

/**
 * Affiche les informations détaillées d’un avion sélectionné.
 */
function showPlaneInfo(cs) {
  const info = ADSB_BY_CALLSIGN[cs];
  const box = document.getElementById("plane-info");

  if (!info) {
    box.style.display = "none";
    return;
  }

  // Couleur dynamique basée sur le cap
  const hue = (info.heading || 0) % 360;
  const color = `hsl(${hue}, 80%, 55%)`;

  box.style.borderLeftColor = color;
  box.style.display = "block";

  box.innerHTML = `
    <div style="font-weight:600; margin-bottom:0.25rem;">
      <span style="color:${color}; vertical-align:middle; margin-right:0.25rem;">
        ${PLANE_ICON_SVG}
      </span>
      ${info.callsign || info.icao}
    </div>

    Latitude : ${info.lat?.toFixed(4)}<br>
    Longitude : ${info.lon?.toFixed(4)}<br>
    Altitude : ${info.altitude ? info.altitude + " ft" : "N/A"}<br>
    Vitesse sol : ${info.speed ? info.speed + " kt" : "N/A"}<br>
    Taux vertical : ${info.verticalRate ? info.verticalRate + " ft/min" : "N/A"}<br>
    Cap : ${info.heading ? info.heading + "°" : "N/A"}<br>
    Sol : ${info.onGround ? "Oui" : "Non"}<br>
    Dernière mise à jour : ${new Date(info.lastSeen).toLocaleTimeString()}<br>
  `;
}

/**
 * Masque le panneau avion.
 */
function hidePlaneInfo() {
  const box = document.getElementById("plane-info");
  box.style.display = "none";
}
/* ============================================================================
   15) METAR
============================================================================ */

async function fetchMetar() {
  if (!AVWX_TOKEN) return null;
  try {
    const r = await fetch(`https://avwx.rest/api/metar/${AVWX_ICAO}?token=${AVWX_TOKEN}`);
    if (!r.ok) throw new Error("METAR HTTP " + r.status);
    return await r.json();
  } catch (e) {
    console.warn("Erreur METAR :", e);
    return null;
  }
}

function updateMetarUI(m) {
  const summary = document.getElementById("meteo-summary");
  const raw = document.getElementById("meteo-raw");

  if (!m) {
    summary.textContent = "METAR indisponible";
    raw.textContent = "";
    return;
  }

  summary.innerHTML = `
    Vent : ${m.wind_direction?.repr || "///"}° ${m.wind_speed?.repr || "0"} kt<br>
    Temp : ${m.temperature?.repr || "N/A"}°C – QNH ${m.altimeter?.value || "N/A"} hPa
  `;
  raw.textContent = m.raw || "";
}

/* ============================================================================
   16) FIDS
============================================================================ */

async function fetchFIDS() {
  try {
    const rArr = await fetch(FIDS_URL_ARR);
    const rDep = await fetch(FIDS_URL_DEP);

    const arr = await rArr.json();
    const dep = await rDep.json();

    LAST_FIDS = { arrivals: arr, departures: dep };
    return LAST_FIDS;

  } catch (e) {
    console.warn("Erreur FIDS :", e);
    return { arrivals: [], departures: [] };
  }
}


function updateFlightsUI(fids) {
  const box = document.getElementById("flights-list");
  const arr = fids.arrivals || [];
  const dep = fids.departures || [];

  const list = [...arr, ...dep];

  if (!list.length) {
    box.textContent = "Aucun vol.";
    return;
  }

  let html = `<table><thead><tr>
    <th>Type</th><th>Vol</th><th>Orig/Dest</th><th>Heure</th>
  </tr></thead><tbody>`;

  list.forEach(v => {
    html += `
      <tr onclick="showFlightDetail('${(v.flight || "").replace(/'/g, "")}')">
        <td>${v.type || ""}</td>
        <td>${v.flight || ""}</td>
        <td>${v.origin || v.destination || ""}</td>
        <td>${v.time || v.sched || ""}</td>
      </tr>`;
  });

  html += `</tbody></table>`;
  box.innerHTML = html;
}

function showFlightDetail(id) {
  const box = document.getElementById("flight-detail");
  if (!LAST_FIDS) {
    box.textContent = "Aucune donnée FIDS.";
    return;
  }

  const all = [...(LAST_FIDS.arrivals || []), ...(LAST_FIDS.departures || [])];
  const v = all.find(x => x.flight === id);

  if (!v) {
    box.textContent = "Vol introuvable.";
    return;
  }

  box.innerHTML = `
    Vol : ${v.flight}<br>
    Origine : ${v.origin}<br>
    Destination : ${v.destination}<br>
    Heure prévue : ${v.time || v.sched}<br>
    Statut : ${v.status || "N/A"}<br>
  `;
}

/* ============================================================================
   17) LOGIQUE PISTE (METAR + FIDS)
============================================================================ */

function extractRunway(fids) {
  const list = [...(fids.arrivals || []), ...(fids.departures || [])];

  for (const v of list) {
    if (v.runway) {
      const n = v.runway.replace(/[^0-9]/g, "");
      const r = EBLG.runways.find(x => x.name === n);
      if (r) return r;
    }
  }
  return null;
}

function runwayFromMetar(m) {
  if (!m || !m.wind_direction?.value) return null;

  const dir = m.wind_direction.value;
  let best = null;

  EBLG.runways.forEach(r => {
    const diff = Math.abs(((r.heading - dir + 540) % 360) - 180);
    if (diff <= HEAD_TOL && (!best || diff < best.diff)) {
      best = { name: r.name, heading: r.heading, diff };
    }
  });

  return best;
}

/* ============================================================================
   18) COLORATION DES SONOMETRES
============================================================================ */

function updateSonoColors(runwayName) {
  const impacted = [];

  SONOS.forEach(s => {
    const m = SONO_MARKERS[s.id];
    if (!m) return;

    let color = COLOR.gray;
    if (runwayName === "04") color = COLOR.green;
    if (runwayName === "22") color = COLOR.red;

    m.setStyle({ color, fillColor: color });
    impacted.push(s.id);
  });

  document.getElementById("sonos-impacted").textContent =
    impacted.length ? impacted.join(", ") : "Aucun";
}

/* ============================================================================
   19) HEATMAP BRUIT
============================================================================ */

function computeImpacted(heading) {
  const poly =
    heading === RWY04_HEADING ? RWY04_EXT_POLY :
    heading === RWY22_HEADING ? RWY22_EXT_POLY :
    buildCorridor(heading);

  const impacted = [];

  SONOS.forEach(s => {
    if (pointInPolygon([s.lat, s.lon], poly)) {
      impacted.push([s.lat, s.lon, 1]);
    }
  });

  return impacted;
}

function updateHeatmap(list) {
  if (heatLayer) {
    map.removeLayer(heatLayer);
    heatLayer = null;
  }
  if (!HEATMAP_ENABLED || !list.length) return;

  heatLayer = L.heatLayer(list, { radius: 25, blur: 15, maxZoom: 15 }).addTo(map);
}

/* ============================================================================
   20) CORRIDOR BRUIT (AFFICHAGE)
============================================================================ */

function updateCorridor() {
  if (corridorLayer) {
    map.removeLayer(corridorLayer);
    corridorLayer = null;
  }

  if (!CORRIDOR_ENABLED || !lastHeading) return;

  const poly = buildCorridor(lastHeading);

  corridorLayer = L.polygon(poly, {
    color: "#f97316",
    weight: 1,
    fillOpacity: 0.08
  }).addTo(map);
}

/* ============================================================================
   21) DIAPASON (BRUIT TEMPS RÉEL)
============================================================================ */

const SENSOR_MAP = {
  "F017": "F017",
  "F018": "F018",
  "F019": "F019"
};

let LIVE_NOISE = {};
let NOISE_HISTORY = {};

function updateNoiseUI(list) {
  const box = document.getElementById("noise-live");
  if (!list.length) {
    box.textContent = "Aucune mesure.";
    return;
  }

  let html = "";
  list.forEach(n => {
    html += `
      <div>
        <span class="badge">${n.id}</span>
        <b>${n.value.toFixed(1)} dB(A)</b>
        – ${new Date(n.time).toLocaleTimeString()}
      </div>`;
  });

  box.innerHTML = html;
}

if (HUB_URL) {
  const connection = new signalR.HubConnectionBuilder().withUrl(HUB_URL).build();

  connection.on("addNoiseMeasure", (sensorId, payload) => {
    const sonoId = SENSOR_MAP[sensorId];
    if (!sonoId) return;

    const value = payload.value || payload.Leq || 0;
    const time = payload.time || Date.now();

    LIVE_NOISE[sonoId] = { id: sonoId, value, time };

    if (!NOISE_HISTORY[sonoId]) NOISE_HISTORY[sonoId] = [];
    NOISE_HISTORY[sonoId].push({ time, value });
    if (NOISE_HISTORY[sonoId].length > 300) NOISE_HISTORY[sonoId].shift();

    updateNoiseUI(Object.values(LIVE_NOISE));
  });

  connection.start().catch(e => console.warn("SignalR error:", e));
}

/* ============================================================================
   22) ALERTES METEO
============================================================================ */

function computeAlerts(metar, rw) {
  const box = document.getElementById("alerts");
  const alerts = [];

  if (!metar) {
    box.innerHTML = `<div class="alert warn">METAR indisponible.</div>`;
    return;
  }

  const wind = metar.wind_speed?.value || 0;
  const gust = metar.wind_gust?.value || 0;
  const vis  = metar.visibility?.value || 9999;

  if (wind >= 20) alerts.push({ level: "warn", msg: `Vent soutenu ${wind} kt.` });
  if (gust >= 30) alerts.push({ level: "danger", msg: `Rafales ${gust} kt.` });
  if (vis < 3000) alerts.push({ level: "warn", msg: `Visibilité réduite ${vis} m.` });

  if (rw && metar.wind_direction?.value) {
    const dir = metar.wind_direction.value;
    const diff = Math.abs(((rw.heading - dir + 540) % 360) - 180);
    if (diff > 60) alerts.push({ level: "warn", msg: `Vent de travers marqué sur piste ${rw.name}.` });
  }

  if (!alerts.length) {
    box.innerHTML = `<div class="alert">Aucune alerte particulière.</div>`;
    return;
  }

  box.innerHTML = alerts.map(a =>
    `<div class="alert ${a.level}">${a.msg}</div>`
  ).join("");
}

============================================================================ */

async function refresh() {
  const metar = await fetchMetar();
  updateMetarUI(metar);

  const fids = await fetchFIDS();
  updateFlightsUI(fids);

  const rwF = extractRunway(fids);
  const rwM = runwayFromMetar(metar);
  const rw  = rwF || rwM;

  if (rw) {
    lastHeading = rw.heading;
    lastRunway  = rw.name;
    document.getElementById("runway-info").textContent =
      `Piste active : ${rw.name} (cap ${rw.heading}°)`;
  } else {
    document.getElementById("runway-info").textContent = "Piste active : inconnue";
  }

  if (rw) updateSonoColors(rw.name);

  const impacted = rw ? computeImpacted(rw.heading) : [];
  updateHeatmap(impacted);

  updateCorridor();

  computeAlerts(metar, rw);

  const adsb = await fetchADSB();
  updateADSB(adsb);

  detectTakeoff04(adsb);
  detectTakeoff22(adsb);
}

setInterval(refresh, 5000);
refresh();
